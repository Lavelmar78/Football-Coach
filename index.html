<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Coach Pro Elite</title>

<style>
body{
  margin:0;
  font-family:-apple-system,BlinkMacSystemFont,sans-serif;
  background:#f3f4f6;
  color:#111827;
}

header{
  background:#111827;
  color:#fff;
  text-align:center;
  padding:14px;
  font-size:20px;
  font-weight:700;
}

.screen{
  display:none;
  padding:12px 12px 90px;
}

.active{
  display:block;
}

.card{
  background:#fff;
  border-radius:12px;
  padding:12px;
  margin-bottom:12px;
  box-shadow:0 1px 4px rgba(0,0,0,.08);
}

input,select,button{
  width:100%;
  box-sizing:border-box;
  padding:10px;
  margin-top:6px;
  margin-bottom:10px;
  border-radius:8px;
  border:1px solid #d1d5db;
  font-size:15px;
}

button{
  background:#111827;
  color:white;
  border:none;
  font-weight:600;
}

.player{
  border-bottom:1px solid #e5e7eb;
  padding:10px 0;
}

.roles{
  display:flex;
  gap:10px;
  flex-wrap:wrap;
  margin-top:8px;
}

.roles label{
  font-size:12px;
}

.pitch{
  position:relative;
  height:420px;
  border-radius:12px;
  overflow:hidden;
  background:linear-gradient(#4CAF50,#2E7D32);
}

.token{
  position:absolute;
  transform:translate(-50%,-50%);
  background:white;
  border-radius:10px;
  padding:6px 8px;
  font-size:12px;
  font-weight:700;
  white-space:nowrap;
}

.tabbar{
  position:fixed;
  bottom:0;
  width:100%;
  display:flex;
  background:#fff;
  border-top:1px solid #d1d5db;
}

.tabbar button{
  flex:1;
  border-radius:0;
  margin:0;
}

.highlight{
  background:#fef3c7;
  padding:12px;
  border-radius:10px;
  margin-bottom:10px;
  text-align:center;
}

.timer{
  font-size:42px;
  text-align:center;
  font-weight:700;
  margin:10px 0 20px;
}

.planBlock{
  border-bottom:1px solid #e5e7eb;
  padding:10px 0;
}

.small{
  font-size:13px;
  color:#6b7280;
}
</style>
</head>

<body>

<header>⚽ Coach Pro Elite</header>

<!-- SETUP -->
<div id="setup" class="screen active">

<div class="card">

<label>Match Length (mins)</label>
<input id="matchLength" type="number" value="52">

<label>Squad Size</label>
<input id="count" type="number" value="11">

<label>
<input type="checkbox" id="gkMode" checked>
 Active GK plays FULL match
</label>

<button onclick="renderPlayers()">
Build Squad Inputs
</button>

<div id="playersContainer"></div>

<button onclick="saveSquad()">
Save Squad
</button>

<h3>Goalkeepers</h3>

<label>1st Half GK</label>
<select id="gk1"></select>

<label>2nd Half GK</label>
<select id="gk2"></select>

<button onclick="generatePlan();showTab('plan')">
Generate Match Plan
</button>

</div>

</div>

<!-- PLAN -->
<div id="plan" class="screen">

<div class="card">
<h3>Rotation Plan</h3>
<div id="planTable"></div>
</div>

<div class="card">
<h3>Minutes</h3>
<div id="minutesTable"></div>
</div>

<div class="card">
<h3>Tactical Board</h3>
<div id="pitch" class="pitch"></div>
</div>

</div>

<!-- MATCH -->
<div id="matchScreen" class="screen">

<div class="timer" id="clock">00:00</div>

<div class="highlight" id="nextChange">
Next change:
</div>

<div class="highlight" id="nextSub">
Upcoming subs:
</div>

<button onclick="startMatch()">Start Match</button>
<button onclick="pauseMatch()">Pause</button>
<button onclick="resetMatch()">Reset</button>
<button onclick="nextBlock()">Next Change</button>

</div>

<!-- NAV -->
<div class="tabbar">
<button onclick="showTab('setup')">Setup</button>
<button onclick="showTab('plan')">Plan</button>
<button onclick="showTab('matchScreen')">Match</button>
</div>

<script>

let playersData = [];
let blocks = [];
let currentIndex = 0;

let timer = null;
let seconds = 0;

function val(id){
  return document.getElementById(id)?.value || "";
}

function chk(id){
  return document.getElementById(id)?.checked || false;
}

function showTab(id){

  document
    .querySelectorAll(".screen")
    .forEach(s=>s.classList.remove("active"));

  document
    .getElementById(id)
    .classList.add("active");
}

/* PLAYERS */

function renderPlayers(){

  const saved = JSON.parse(
    localStorage.getItem("coachSquad") || "[]"
  );

  let html = "";

  for(let i=0;i<Number(val("count"));i++){

    const p = saved[i] || {};

    html += `
    <div class="player">

      <input
        id="p${i}"
        value="${p.name || ""}"
        placeholder="Player Name"
        oninput="updateGKSelectors()"
      >

      <label>
        <input
          type="checkbox"
          id="avail${i}"
          ${p.available !== false ? "checked" : ""}
        >
        Available
      </label>

      <div class="roles">

        <label>
          <input type="checkbox"
            id="def${i}"
            ${p.def ? "checked":""}>
          DEF
        </label>

        <label>
          <input type="checkbox"
            id="midc${i}"
            ${p.midc ? "checked":""}>
          MID-C
        </label>

        <label>
          <input type="checkbox"
            id="midw${i}"
            ${p.midw ? "checked":""}>
          MID-W
        </label>

        <label>
          <input type="checkbox"
            id="att${i}"
            ${p.att ? "checked":""}>
          ATT
        </label>

      </div>

    </div>
    `;
  }

  document
    .getElementById("playersContainer")
    .innerHTML = html;

  updateGKSelectors();
}

function saveSquad(){

  const squad = [];

  for(let i=0;i<Number(val("count"));i++){

    squad.push({
      name: val("p"+i),
      available: chk("avail"+i),
      def: chk("def"+i),
      midc: chk("midc"+i),
      midw: chk("midw"+i),
      att: chk("att"+i)
    });
  }

  localStorage.setItem(
    "coachSquad",
    JSON.stringify(squad)
  );
}

function updateGKSelectors(){

  let html = "";

  for(let i=0;i<Number(val("count"));i++){

    if(!chk("avail"+i)) continue;

    const name = val("p"+i);

    if(!name) continue;

    html += `<option>${name}</option>`;
  }

  document.getElementById("gk1").innerHTML = html;
  document.getElementById("gk2").innerHTML = html;
}

/* ENGINE */

function generatePlan(){

  playersData = [];

  for(let i=0;i<Number(val("count"));i++){

    if(!chk("avail"+i)) continue;

    playersData.push({
      name: val("p"+i),
      minutes:0,
      positions:{
        def: chk("def"+i),
        midc: chk("midc"+i),
        midw: chk("midw"+i),
        att: chk("att"+i)
      }
    });
  }

  const matchLength =
    Number(val("matchLength"));

  const half =
    matchLength / 2;

  const gk1 =
    playersData.find(
      p=>p.name===val("gk1")
    );

  const gk2 =
    playersData.find(
      p=>p.name===val("gk2")
    );

  // FULL MATCH BLOCKS
  const totalBlocks = 4;
  const block = matchLength / totalBlocks;

  blocks = [];

  for(let b=0;b<totalBlocks;b++){

    const start = b * block;
    const end = start + block;

    // ACTIVE GK
    const activeGK =
      start < half
      ? gk1
      : gk2;

    const lineup = [];
    const used = new Set();

    // GK ALWAYS INCLUDED
    lineup.push(activeGK);
    used.add(activeGK.name);

    function choose(role){

      let eligible =
        playersData.filter(p=>{

          if(used.has(p.name))
            return false;

          // OTHER GK PLAYS OUTFIELD
          // IN OPPOSITE HALF
          if(chk("gkMode")){

            if(
              start < half &&
              p===gk2
            ) return false;

            if(
              start >= half &&
              p===gk1
            ) return false;
          }

          if(role==="def")
            return p.positions.def;

          if(role==="midc")
            return p.positions.midc;

          if(role==="midw")
            return p.positions.midw;

          if(role==="att")
            return p.positions.att;

          return true;
        });

      if(!eligible.length){

        eligible =
          playersData.filter(
            p=>!used.has(p.name)
          );
      }

      eligible.sort((a,b)=>{

        const aNeed =
          a.minutes;

        const bNeed =
          b.minutes;

        if(aNeed===bNeed)
          return Math.random()-0.5;

        return aNeed - bNeed;
      });

      const chosen = eligible[0];

      used.add(chosen.name);

      return chosen;
    }

    lineup.push(choose("def"));
    lineup.push(choose("def"));

    lineup.push(choose("midc"));
    lineup.push(choose("midc"));

    lineup.push(choose("midw"));

    lineup.push(choose("att"));

    lineup.forEach(p=>{
      p.minutes += block;
    });

    blocks.push({
      time:end,
      lineup
    });
  }

  buildPlan();
  buildMinutes();

  if(blocks[0]){
    drawPitch(blocks[0].lineup);
  }

  currentIndex = 0;

  updateNextSub();
}

/* PLAN */

function buildPlan(){

  let html = "";

  for(let i=0;i<blocks.length;i++){

    const block = blocks[i];

    html += `
    <div class="planBlock">

      <strong>${block.time}m</strong><br>

      ${block.lineup
        .map(p=>p.name)
        .join(", ")}

    `;

    if(i>0){

      const prev =
        blocks[i-1];

      const off =
        prev.lineup.filter(
          p=>!block.lineup.includes(p)
        );

      const on =
        block.lineup.filter(
          p=>!prev.lineup.includes(p)
        );

      html += `
      <div class="small">

      OFF:
      ${off.map(p=>p.name).join(", ")}

      <br>

      ON:
      ${on.map(p=>p.name).join(", ")}

      </div>
      `;
    }

    html += `
    </div>
    `;
  }

  document
    .getElementById("planTable")
    .innerHTML = html;
}

/* MINUTES */

function buildMinutes(){

  let html = "";

  playersData
    .sort((a,b)=>b.minutes-a.minutes)
    .forEach(p=>{

      html += `
      <div>
        ${p.name}: ${p.minutes} mins
      </div>
      `;
    });

  document
    .getElementById("minutesTable")
    .innerHTML = html;
}

/* PITCH */

function drawPitch(lineup){

  const pitch =
    document.getElementById("pitch");

  pitch.innerHTML = "";

  const coords = [
    [50,90],
    [20,70],
    [80,70],
    [20,45],
    [50,45],
    [80,45],
    [50,20]
  ];

  lineup.forEach((p,i)=>{

    const el =
      document.createElement("div");

    el.className = "token";
    el.innerText = p.name;

    el.style.left =
      coords[i][0] + "%";

    el.style.top =
      coords[i][1] + "%";

    pitch.appendChild(el);
  });
}

/* MATCH */

function updateNextSub(){

  if(!blocks[currentIndex+1])
    return;

  const current =
    blocks[currentIndex];

  const next =
    blocks[currentIndex+1];

  const off =
    current.lineup.filter(
      p=>!next.lineup.includes(p)
    );

  const on =
    next.lineup.filter(
      p=>!current.lineup.includes(p)
    );

  document
    .getElementById("nextSub")
    .innerHTML =
    `
    OFF:
    ${off.map(p=>p.name).join(", ")}

    <br>

    ON:
    ${on.map(p=>p.name).join(", ")}
    `;
}

function startMatch(){

  if(timer) return;

  timer = setInterval(()=>{

    seconds++;

    const mins =
      Math.floor(seconds/60)
      .toString()
      .padStart(2,"0");

    const secs =
      (seconds%60)
      .toString()
      .padStart(2,"0");

    document
      .getElementById("clock")
      .innerText =
      `${mins}:${secs}`;

    const next =
      blocks.find(
        b=>b.time > seconds/60
      );

    if(next){

      document
        .getElementById("nextChange")
        .innerText =
        `Next change: ${next.time} mins`;
    }

  },1000);
}

function pauseMatch(){

  clearInterval(timer);

  timer = null;
}

function resetMatch(){

  pauseMatch();

  seconds = 0;

  document
    .getElementById("clock")
    .innerText = "00:00";
}

function nextBlock(){

  currentIndex++;

  if(currentIndex >= blocks.length)
    return;

  drawPitch(
    blocks[currentIndex].lineup
  );

  updateNextSub();
}

/* INIT */

renderPlayers();

</script>

</body>
</html>
