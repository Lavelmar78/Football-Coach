<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Coach Pro Elite</title>

<style>
body { font-family:-apple-system; margin:0; background:#f5f5f5; }
header { background:#111; color:#fff; padding:12px; text-align:center; }

.screen { display:none; padding:10px 10px 80px; }
.active { display:block; }

.tabbar {
  position:fixed; bottom:0; width:100%;
  display:flex; background:#fff; border-top:1px solid #ccc;
}
.tabbar button { flex:1; padding:10px; }

.card { background:#fff; padding:10px; margin-bottom:10px; border-radius:8px; }
.player { border-bottom:1px solid #eee; padding:6px 0; }

.pitch {
  position:relative;
  height:320px;
  background:linear-gradient(#4CAF50,#388E3C);
  border-radius:8px;
}

.token {
  position:absolute;
  background:#fff;
  padding:4px;
  border-radius:4px;
  font-size:11px;
  transform:translate(-50%,-50%);
}

.highlight { background:#ffeeba; padding:10px; text-align:center; }

.timer { font-size:28px; text-align:center; margin:10px 0; }
</style>
</head>

<body>

<header>⚽ Coach Pro Elite</header>

<!-- SETUP -->
<div id="setup" class="screen active">
<div class="card">

<label>Match Length (mins)</label>
<input id="matchLength" value="40">

<label>Sub Window (mins, min 6)</label>
<input id="subWindow" value="6">

<label>Squad Size</label>
<input id="count" value="10" onchange="renderPlayers()">

<label>
<input type="checkbox" id="gkMode" checked>
GK plays full match (half GK / half outfield)
</label>

<div id="players"></div>

<button onclick="saveSquad()">Save Squad</button>

<h4>Goalkeepers</h4>
<select id="gk1"></select>
<select id="gk2"></select>

<button onclick="generatePlan(); showTab('plan')">Generate Plan</button>

</div>
</div>

<!-- PLAN -->
<div id="plan" class="screen">
<div class="card">
<h3>Rotation Plan</h3>
<div id="planTable"></div>
</div>

<div class="card">
<h3>Minutes</h3>
<div id="minutesTable"></div>
</div>

<div class="card">
<h3>Pitch</h3>
<div id="pitch" class="pitch"></div>
</div>
</div>

<!-- MATCH -->
<div id="matchScreen" class="screen">
<div class="timer" id="clock">00:00</div>
<div id="nextChange" class="highlight">Next change: --</div>
<div id="suggestion" class="highlight">Suggestion</div>

<button onclick="startMatch()">Start</button>
<button onclick="pauseMatch()">Pause</button>
<button onclick="resetMatch()">Reset</button>
<button onclick="nextBlock()">Next Block</button>
</div>

<div class="tabbar">
<button onclick="showTab('setup')">Setup</button>
<button onclick="showTab('plan')">Plan</button>
<button onclick="showTab('matchScreen')">Match</button>
</div>

<script>

let players=[], blocks=[], currentIndex=0;
let timer=null, seconds=0;

/* NAV */
function showTab(id){
  document.querySelectorAll(".screen").forEach(s=>s.classList.remove("active"));
  document.getElementById(id).classList.add("active");
}

/* HELPERS */
function val(id){return document.getElementById(id)?.value||"";}
function chk(id){return document.getElementById(id)?.checked||false;}

/* RENDER */
function renderPlayers(){

  let saved = JSON.parse(localStorage.getItem("squad")||"[]");
  let n=+val("count");
  let html="";

  for(let i=0;i<n;i++){
    let p=saved[i]||{};

    html+=`
    <div class="player">
      <input id="p${i}" value="${p.name||""}" placeholder="Player" oninput="updateGK()">
      <label><input type="checkbox" id="avail${i}" ${p.avail!==false?"checked":""}>Avail</label><br>
      <label><input type="checkbox" id="def${i}" ${p.def?"checked":""}>DEF</label>
      <label><input type="checkbox" id="midc${i}" ${p.midc?"checked":""}>MID-C</label>
      <label><input type="checkbox" id="midw${i}" ${p.midw?"checked":""}>MID-W</label>
      <label><input type="checkbox" id="att${i}" ${p.att?"checked":""}>ATT</label>
    </div>`;
  }

  document.getElementById("players").innerHTML=html;
  updateGK();
}

/* SAVE */
function saveSquad(){
  let arr=[];
  for(let i=0;i<count.value;i++){
    arr.push({
      name:val("p"+i),
      avail:chk("avail"+i),
      def:chk("def"+i),
      midc:chk("midc"+i),
      midw:chk("midw"+i),
      att:chk("att"+i)
    });
  }
  localStorage.setItem("squad", JSON.stringify(arr));
}

/* GK */
function updateGK(){
  let html="";
  for(let i=0;i<count.value;i++){
    if(!chk("avail"+i)) continue;
    html+=`<option>${val("p"+i)||"P"+(i+1)}</option>`;
  }
  gk1.innerHTML=html;
  gk2.innerHTML=html;
}

/* POSITION MATCH */
function fits(p,role){
  return p.pos[role];
}

/* GENERATE */
function generatePlan(){

  players=[];

  for(let i=0;i<count.value;i++){
    if(!chk("avail"+i)) continue;

    players.push({
      name:val("p"+i)||"P"+(i+1),
      minutes:0,
      pos:{
        def:chk("def"+i),
        midc:chk("midc"+i),
        midw:chk("midw"+i),
        att:chk("att"+i)
      }
    });
  }

  let matchLen=+val("matchLength");
  let block=Math.max(6,+val("subWindow"));
  let totalBlocks=Math.floor(matchLen/block);
  let half=Math.floor(totalBlocks/2);

  let gkMode=chk("gkMode");

  let gk1p=players.find(p=>p.name===gk1.value);
  let gk2p=players.find(p=>p.name===gk2.value);

  blocks=[];

  for(let i=0;i<totalBlocks;i++){

    let gk=i<half?gk1p:gk2p;

    let lineup=[gk];

    let pool=players.filter(p=>{
      if(p===gk) return false;
      if(!gkMode && (p===gk1p||p===gk2p)) return true;
      return true;
    });

    pool.sort((a,b)=>a.minutes-b.minutes);

    while(lineup.length<7){
      lineup.push(pool.shift());
    }

    lineup.forEach(p=>p.minutes+=block);

    blocks.push({time:i*block,lineup});
  }

  buildPlan();
  buildMinutes();
  drawPitch(blocks[0].lineup);
  currentIndex=0;
}

/* PLAN */
function buildPlan(){
  let html="";
  blocks.forEach(b=>{
    html+=`<div><b>${b.time}m</b>: ${b.lineup.map(p=>p.name).join(", ")}</div>`;
  });
  planTable.innerHTML=html;
}

/* MINUTES */
function buildMinutes(){
  let html="";
  players.forEach(p=>{
    html+=`${p.name}: ${p.minutes} mins<br>`;
  });
  minutesTable.innerHTML=html;
}

/* PITCH */
function drawPitch(lineup){
  let pitch=document.getElementById("pitch");
  pitch.innerHTML="";

  let layout=[1,2,3,1];
  let y=[10,35,60,85];

  let i=0;

  for(let r=0;r<layout.length;r++){
    for(let j=0;j<layout[r];j++){
      let p=lineup[i];
      if(!p) continue;

      let x=(j+1)/(layout[r]+1)*100;

      let el=document.createElement("div");
      el.className="token";
      el.innerText=p.name;

      el.style.left=x+"%";
      el.style.top=y[r]+"%";

      pitch.appendChild(el);
      i++;
    }
  }
}

/* TIMER */
function startMatch(){
  if(timer) return;

  timer=setInterval(()=>{
    seconds++;

    let m=Math.floor(seconds/60).toString().padStart(2,'0');
    let s=(seconds%60).toString().padStart(2,'0');

    clock.innerText=`${m}:${s}`;

    let currentBlock=Math.floor((seconds/60)/(+subWindow.value));
    let nextTime=(currentBlock+1)*(+subWindow.value);

    nextChange.innerText=`Next change: ${nextTime} min`;

    if(seconds/60>=nextTime){
      alert("Time to make a sub");
    }

  },1000);
}

function pauseMatch(){clearInterval(timer);timer=null;}
function resetMatch(){pauseMatch();seconds=0;clock.innerText="00:00";}

/* MATCH */
function nextBlock(){

  currentIndex++;
  if(currentIndex>=blocks.length) return;

  let current=blocks[currentIndex].lineup;
  drawPitch(current);

  let off=[...current].sort((a,b)=>b.minutes-a.minutes)[0];
  let bench=players.filter(p=>!current.includes(p));
  let on=[...bench].sort((a,b)=>a.minutes-b.minutes)[0];

  suggestion.innerText=`Suggested: OFF ${off.name} / ON ${on.name}`;
}

/* INIT */
renderPlayers();

</script>

</body>
</html>
