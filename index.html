<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Coach Pro Elite</title>

<style>
body { font-family:-apple-system; margin:0; background:#f5f5f5; }
header { background:#111; color:#fff; padding:12px; text-align:center; }

.screen { display:none; padding:10px 10px 70px; }
.active { display:block; }

.tabbar {
  position:fixed; bottom:0; width:100%;
  display:flex; background:#fff; border-top:1px solid #ccc;
}
.tabbar button { flex:1; padding:10px; border:none; }

.card { background:#fff; padding:10px; margin-bottom:10px; border-radius:8px; }

.player { padding:5px 0; border-bottom:1px solid #eee; }

.pitch {
  position:relative;
  height:300px;
  background:linear-gradient(#4CAF50,#388E3C);
  border-radius:8px;
}

.token {
  position:absolute;
  background:#fff;
  padding:4px;
  border-radius:4px;
  font-size:11px;
  transform:translate(-50%,-50%);
}

.big { font-size:26px; text-align:center; }
.highlight { background:#ffeeba; padding:10px; text-align:center; }

.barWrap { background:#eee; }
.bar { height:10px; background:#4CAF50; }
</style>
</head>

<body>

<header>⚽ Coach Pro Elite</header>

<!-- SETUP -->
<div id="setup" class="screen active">
<div class="card">

<select id="formation">
<option value="2-3-1">2-3-1</option>
<option value="3-2-1">3-2-1</option>
<option value="3-3">3-3</option>
<option value="2-2-2">2-2-2</option>
</select>

<input id="match" value="40">
<input id="block" value="6">
<input id="count" value="10" onchange="renderPlayers()">

<div id="players"></div>

<button onclick="generate(); showTab('plan')">Generate Plan</button>

</div>
</div>

<!-- PLAN -->
<div id="plan" class="screen">
<div class="card">
<h3>Sub Blocks</h3>
<div id="planTable"></div>
</div>

<div class="card">
<h3>Formation</h3>
<div id="pitch" class="pitch"></div>
</div>
</div>

<!-- MATCH -->
<div id="matchScreen" class="screen">
<div class="card big" id="clock">00:00</div>
<div class="card highlight" id="next">Next change</div>
<button onclick="start()">Start</button>
<button onclick="pause()">Pause</button>
<button onclick="nextBlock()">Next Block</button>
</div>

<!-- STATS -->
<div id="stats" class="screen">
<div class="card">
<h3>Minutes</h3>
<div id="minutes"></div>
</div>
</div>

<div class="tabbar">
<button onclick="showTab('setup')">Setup</button>
<button onclick="showTab('plan')">Plan</button>
<button onclick="showTab('matchScreen')">Match</button>
<button onclick="showTab('stats')">Stats</button>
</div>

<script>

let players=[], blocks=[], current=[], sec=0, timer=null, index=0;

/* NAV */
function showTab(id){
  document.querySelectorAll(".screen").forEach(s=>s.classList.remove("active"));
  document.getElementById(id).classList.add("active");
}

/* PLAYERS */
function renderPlayers(){
  let n=count.value, html="";
  for(let i=0;i<n;i++){
    html+=`
    <div class="player">
      <input id="p${i}" placeholder="Player ${i+1}">
      <label><input type="checkbox" id="s${i}">Starter</label>
    </div>`;
  }
  playersDiv.innerHTML=html;
}

/* DATA */
function getPlayers(){
  let n=count.value, arr=[];
  for(let i=0;i<n;i++){
    arr.push({
      name:document.getElementById("p"+i).value||"P"+(i+1),
      starter:document.getElementById("s"+i).checked,
      minutes:0
    });
  }
  return arr;
}

/* FAIR BLOCK SYSTEM */
function generate(){

  players=getPlayers();

  let starters=players.filter(p=>p.starter);
  let bench=players.filter(p=>!p.starter);

  let match=+match.value;
  let block=+block.value;
  let totalBlocks=Math.floor(match/block);

  blocks=[];

  let rotation=[...players];

  for(let i=0;i<totalBlocks;i++){

    rotation.sort((a,b)=>a.minutes-b.minutes);

    let lineup=rotation.slice(0, starters.length);

    lineup.forEach(p=>p.minutes+=block);

    blocks.push({
      time:i*block,
      lineup:lineup.map(p=>p.name)
    });
  }

  buildPlan();
  current=blocks[0].lineup;
  drawFormation(current);
  index=0;
  updateNext();
}

/* PLAN UI */
function buildPlan(){
  let html="";
  blocks.forEach(b=>{
    html+=`<div><b>${b.time}m</b>: ${b.lineup.join(", ")}</div>`;
  });
  planTable.innerHTML=html;
}

/* FORMATION POSITIONS */
function drawFormation(lineup){

  let pitch=document.getElementById("pitch");
  pitch.innerHTML="";

  let f=document.getElementById("formation").value.split("-");

  let rows=[
    {y:20,count:+f[2]},
    {y:50,count:+f[1]},
    {y:80,count:+f[0]}
  ];

  let i=0;

  rows.forEach(r=>{
    for(let j=0;j<r.count;j++){
      if(!lineup[i]) continue;

      let x=(j+1)/(r.count+1)*100;

      let el=document.createElement("div");
      el.className="token";
      el.innerText=lineup[i];

      el.style.left=x+"%";
      el.style.top=r.y+"%";

      pitch.appendChild(el);

      i++;
    }
  });
}

/* MATCH */
function start(){
  if(timer) return;
  timer=setInterval(()=>{
    sec++;
    clock.innerText=format(sec);
  },1000);
}

function pause(){ clearInterval(timer); timer=null; }

function nextBlock(){
  index++;
  if(index>=blocks.length) return;
  current=blocks[index].lineup;
  drawFormation(current);
  updateNext();
}

function updateNext(){
  if(index>=blocks.length-1){
    next.innerText="Done";
    return;
  }
  next.innerText="Next change @ "+blocks[index+1].time+"m";
}

/* UTIL */
function format(s){
  let m=Math.floor(s/60).toString().padStart(2,'0');
  let ss=(s%60).toString().padStart(2,'0');
  return m+":"+ss;
}

/* INIT */
renderPlayers();

</script>

</body>
</html>
