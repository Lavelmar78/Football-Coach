<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Coach ELITE+</title>
<style>
body { font-family: Arial; padding: 15px; }
input, button, select { width: 100%; padding: 10px; margin: 5px 0; }
.player { border:1px solid #ddd; padding:8px; margin-bottom:5px; }
.small { font-size:12px; }
.big { font-size:24px; text-align:center; }
.highlight { background:#ffeeba; padding:10px; text-align:center; font-size:18px; }
</style>
</head>

<body>

<h2>⚽ Coach ELITE+</h2>

<label>Game Format</label>
<select id="format" onchange="setFormat()">
<option value="5">5-a-side</option>
<option value="7" selected>7-a-side</option>
<option value="9">9-a-side</option>
<option value="11">11-a-side</option>
</select>

<label>Match length (mins)</label>
<input id="match" type="number" value="40">

<label>Sub interval (mins)</label>
<input id="interval" type="number" value="5">

<label>Squad size</label>
<input id="count" type="number" value="10" onchange="renderPlayers()">

<div id="players"></div>

<h3>🧤 Goalkeepers</h3>
<select id="gk1"></select>
<select id="gk2"></select>

<button onclick="generate()">Generate Plan</button>

<hr>

<div class="big" id="clock">00:00</div>
<div class="highlight" id="next">Press Start</div>

<button onclick="start()">Start</button>
<button onclick="pause()">Pause</button>
<button onclick="reset()">Reset</button>
<button onclick="nextSub()">Next Sub Done</button>

<script>

let players=[], plan=[], sec=0, timer=null, index=0, onfield=7;

function setFormat(){
  let f = +document.getElementById("format").value;
  onfield = f - 1; // minus GK
}

function renderPlayers(){
  let n=document.getElementById("count").value;
  let div=document.getElementById("players");
  div.innerHTML="<h3>Players</h3>";

  for(let i=0;i<n;i++){
    div.innerHTML+=`
    <div class="player">
      <input id="p${i}" placeholder="Player ${i+1}">
      <div class="small">
        <label><input type="checkbox" id="def${i}"> DEF</label>
        <label><input type="checkbox" id="mid${i}"> MID</label>
        <label><input type="checkbox" id="att${i}"> ATT</label>
      </div>
      <label><input type="checkbox" id="s${i}"> Starter</label>
    </div>`;
  }

  updateGKDropdowns();
}

function updateGKDropdowns(){
  let n=document.getElementById("count").value;
  let gk1=document.getElementById("gk1");
  let gk2=document.getElementById("gk2");

  gk1.innerHTML=""; gk2.innerHTML="";

  for(let i=0;i<n;i++){
    let name=document.getElementById("p"+i)?.value || "P"+(i+1);
    gk1.innerHTML+=`<option value="${i}">${name}</option>`;
    gk2.innerHTML+=`<option value="${i}">${name}</option>`;
  }
}

function getPlayers(){
  let n=document.getElementById("count").value;
  let arr=[];
  for(let i=0;i<n;i++){
    arr.push({
      name:document.getElementById("p"+i).value||"P"+(i+1),
      starter:document.getElementById("s"+i).checked,
      minutes:0,
      pos:{
        def:document.getElementById("def"+i).checked,
        mid:document.getElementById("mid"+i).checked,
        att:document.getElementById("att"+i).checked
      }
    });
  }
  return arr;
}

function samePosition(a,b){
  return (a.pos.def && b.pos.def) ||
         (a.pos.mid && b.pos.mid) ||
         (a.pos.att && b.pos.att);
}

function generate(){

  let match=+document.getElementById("match").value;
  let interval=+document.getElementById("interval").value;

  players=getPlayers();

  let gk1=+document.getElementById("gk1").value;
  let gk2=+document.getElementById("gk2").value;

  let slots=Math.floor(match/interval);
  let half=Math.floor(slots/2);

  let starters=players.filter(p=>p.starter);
  if(starters.length!==onfield){
    alert("Starters must match outfield players");
    return;
  }

  let current=[...starters];
  plan=[];

  for(let i=0;i<slots;i++){

    let activeGK = i<half ? players[gk1] : players[gk2];

    let field=current.filter(p=>p!==activeGK);
    field.forEach(p=>p.minutes+=interval);

    field.sort((a,b)=>b.minutes-a.minutes);
    let off=field[0];

    let bench=players.filter(p=>!current.includes(p) && p!==activeGK);

    let samePosBench = bench.filter(p=>samePosition(p, off));
    samePosBench.sort((a,b)=>a.minutes-b.minutes);

    let on = samePosBench[0] || bench.sort((a,b)=>a.minutes-b.minutes)[0];

    if(off && on){
      current=current.filter(p=>p!==off);
      current.push(on);
    }

    plan.push({
      time:i*interval,
      off:off?.name||"-",
      on:on?.name||"-",
      gk:activeGK.name
    });
  }

  index=0;
  updateNext();
}

function start(){
  if(timer) return;
  timer=setInterval(()=>{
    sec++;
    let m=Math.floor(sec/60).toString().padStart(2,'0');
    let s=(sec%60).toString().padStart(2,'0');
    document.getElementById("clock").innerText=m+":"+s;
    check();
  },1000);
}

function pause(){ clearInterval(timer); timer=null; }
function reset(){ pause(); sec=0; index=0; updateNext(); }

function check(){
  if(index>=plan.length) return;
  let t=plan[index].time*60;
  if(sec>=t){
    alert(`GK: ${plan[index].gk}\n${plan[index].off} OFF → ${plan[index].on} ON`);
    if(navigator.vibrate) navigator.vibrate(300);
  }
}

function nextSub(){
  index++;
  updateNext();
}

function updateNext(){
  if(index>=plan.length){
    document.getElementById("next").innerText="Game done";
    return;
  }
  let p=plan[index];
  document.getElementById("next").innerText=
    `GK: ${p.gk} | ${p.off} → ${p.on} @ ${p.time}m`;
}

setFormat();
renderPlayers();

</script>

</body>
</html>
