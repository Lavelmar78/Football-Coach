<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Coach App</title>

<style>
body { font-family:-apple-system; margin:0; background:#f5f5f5; }

header {
  background:#111; color:#fff; padding:12px;
  text-align:center; font-weight:bold;
}

.tabbar {
  display:flex;
  position:fixed;
  bottom:0;
  width:100%;
  background:#fff;
  border-top:1px solid #ccc;
}

.tabbar button {
  flex:1;
  padding:10px;
  border:none;
  background:none;
}

.tabbar button.active {
  background:#ddd;
}

.screen { display:none; padding:10px 10px 70px; }
.active { display:block; }

.card {
  background:#fff;
  padding:10px;
  margin-bottom:10px;
  border-radius:8px;
}

.big { font-size:28px; text-align:center; }
.highlight {
  background:#ffeeba;
  padding:12px;
  text-align:center;
  font-size:20px;
  border-radius:8px;
}

.player { margin-bottom:6px; }

.barWrap { background:#eee; }
.bar { height:10px; background:#4CAF50; }

.pitch { display:grid; grid-template-columns:repeat(3,1fr); gap:6px; }
.zone { height:70px; border:2px dashed #ccc; }

.token {
  background:#4CAF50;
  color:#fff;
  padding:4px;
  font-size:12px;
  margin:2px;
}

</style>
</head>

<body>

<header>⚽ Coach App</header>

<!-- SETUP -->
<div id="setup" class="screen active">
<div class="card">

<select id="format" onchange="setFormat()">
<option value="7">7-a-side</option>
<option value="5">5-a-side</option>
<option value="9">9-a-side</option>
<option value="11">11-a-side</option>
</select>

<input id="match" value="40" placeholder="Match mins">
<input id="interval" value="5" placeholder="Sub interval">
<input id="count" value="10" onchange="renderPlayers()">

<div id="players"></div>

<h4>Goalkeepers</h4>
<select id="gk1"></select>
<select id="gk2"></select>

<button onclick="saveTeam()">Save</button>
<button onclick="loadTeam()">Load</button>

<button onclick="generate(); showTab('plan')">Generate Plan</button>

</div>
</div>

<!-- PLAN -->
<div id="plan" class="screen">
<div class="card">
<h3>Sub Plan</h3>
<div id="planTable"></div>
</div>

<div class="card">
<h3>Formation</h3>
<div id="pitch" class="pitch"></div>
</div>
</div>

<!-- MATCH -->
<div id="matchScreen" class="screen">

<div class="card big" id="clock">00:00</div>

<div class="card highlight" id="next">Next sub</div>

<div class="card">
<button onclick="start()">Start</button>
<button onclick="pause()">Pause</button>
<button onclick="nextSub()">Next Sub</button>
</div>

</div>

<!-- STATS -->
<div id="stats" class="screen">
<div class="card">
<h3>Minutes</h3>
<div id="minutes"></div>
</div>
</div>

<!-- TAB BAR -->
<div class="tabbar">
<button onclick="showTab('setup')">Setup</button>
<button onclick="showTab('plan')">Plan</button>
<button onclick="showTab('matchScreen')">Match</button>
<button onclick="showTab('stats')">Stats</button>
</div>

<script>

let players=[], plan=[], current=[], sec=0, timer=null, index=0, onfield=6;

function showTab(id){
  document.querySelectorAll(".screen").forEach(s=>s.classList.remove("active"));
  document.getElementById(id).classList.add("active");
}

function setFormat(){
  onfield=document.getElementById("format").value-1;
}

function renderPlayers(){
  let n=count.value;
  let html="";
  for(let i=0;i<n;i++){
    html+=`
    <div class="player">
      <input id="p${i}" placeholder="Player ${i+1}">
      <label><input type="checkbox" id="s${i}"> Starter</label>
    </div>`;
  }
  players.innerHTML=html;
  updateGK();
}

function updateGK(){
  let n=count.value;
  let html="";
  for(let i=0;i<n;i++){
    let name=document.getElementById("p"+i)?.value||"P"+(i+1);
    html+=`<option value="${i}">${name}</option>`;
  }
  gk1.innerHTML=html;
  gk2.innerHTML=html;
}

function getPlayers(){
  let n=count.value;
  let arr=[];
  for(let i=0;i<n;i++){
    arr.push({
      name:document.getElementById("p"+i).value||"P"+(i+1),
      starter:document.getElementById("s"+i).checked,
      minutes:0
    });
  }
  return arr;
}

function generate(){
  players=getPlayers();
  current=players.filter(p=>p.starter);

  let match=+match.value;
  let interval=+interval.value;
  let slots=Math.floor(match/interval);

  plan=[];
  for(let i=1;i<slots;i++){
    plan.push({
      time:i*interval,
      off:current[0]?.name,
      on:players.find(p=>!p.starter)?.name
    });
  }

  buildPlan();
  buildFormation();
  index=0;
  updateNext();
}

function buildPlan(){
  let html="<table><tr><th>Time</th><th>Off</th><th>On</th></tr>";
  plan.forEach(p=>{
    html+=`<tr><td>${p.time}</td><td>${p.off}</td><td>${p.on}</td></tr>`;
  });
  html+="</table>";
  planTable.innerHTML=html;
}

function buildFormation(){
  pitch.innerHTML="";
  for(let i=0;i<6;i++){
    pitch.innerHTML+=`<div class="zone"></div>`;
  }
}

function start(){
  if(timer) return;
  timer=setInterval(()=>{
    sec++;
    clock.innerText=format(sec);
    current.forEach(p=>p.minutes+=1/60);
    renderMinutes();
  },1000);
}

function pause(){ clearInterval(timer); timer=null; }

function nextSub(){ index++; updateNext(); }

function updateNext(){
  if(index>=plan.length){ next.innerText="Done"; return; }
  let p=plan[index];
  next.innerText=`${p.off} → ${p.on} @ ${p.time}m`;
}

function renderMinutes(){
  let total=+match.value;
  let html="";
  players.forEach(p=>{
    let percent=(p.minutes/total)*100;
    html+=`${p.name}
    <div class="barWrap"><div class="bar" style="width:${percent}%"></div></div>`;
  });
  minutes.innerHTML=html;
}

function saveTeam(){
  localStorage.setItem("team", JSON.stringify(getPlayers()));
}

function loadTeam(){
  let data=JSON.parse(localStorage.getItem("team")||"[]");
  data.forEach((p,i)=>{
    document.getElementById("p"+i).value=p.name;
    document.getElementById("s"+i).checked=p.starter;
  });
}

function format(s){
  let m=Math.floor(s/60).toString().padStart(2,'0');
  let ss=(s%60).toString().padStart(2,'0');
  return m+":"+ss;
}

setFormat();
renderPlayers();

</script>

</body>
</html>
