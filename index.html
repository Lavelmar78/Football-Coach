<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Coach FINAL+</title>
<style>
body { font-family: Arial; padding: 10px; }
input, button, select { width:100%; padding:10px; margin:5px 0; }

.player { border:1px solid #ddd; padding:6px; margin-bottom:5px; }

.bar {
  height:10px;
  background:#4CAF50;
}

.barWrap {
  background:#eee;
  margin-bottom:5px;
}

.big { font-size:24px; text-align:center; }
.highlight { background:#ffeeba; padding:10px; text-align:center; }

</style>
</head>

<body>

<h2>⚽ Coach FINAL+</h2>

<label>Format</label>
<select id="format" onchange="setFormat()">
<option value="5">5-a-side</option>
<option value="7" selected>7-a-side</option>
<option value="9">9-a-side</option>
<option value="11">11-a-side</option>
</select>

<label>Match (mins)</label>
<input id="match" value="40">

<label>Interval (mins)</label>
<input id="interval" value="5">

<label>Squad</label>
<input id="count" value="10" onchange="renderPlayers()">

<div id="players"></div>

<h3>🧤 GK</h3>
<select id="gk1"></select>
<select id="gk2"></select>

<button onclick="generate()">Generate Plan</button>

<hr>

<div class="big" id="clock">00:00</div>
<div class="highlight" id="next">Press Start</div>

<button onclick="start()">Start</button>
<button onclick="pause()">Pause</button>
<button onclick="reset()">Reset</button>
<button onclick="nextSub()">Next Sub Done</button>

<h3>📊 Minutes Tracker</h3>
<div id="minutes"></div>

<script>

let players=[], plan=[], sec=0, timer=null, index=0, onfield=7, current=[];

function setFormat(){
  let f=+document.getElementById("format").value;
  onfield=f-1;
}

function renderPlayers(){
  let n=document.getElementById("count").value;
  let div=document.getElementById("players");
  div.innerHTML="<h3>Players</h3>";

  for(let i=0;i<n;i++){
    div.innerHTML+=`
    <div class="player">
      <input id="p${i}" placeholder="Player ${i+1}">
      <label><input type="checkbox" id="s${i}"> Starter</label>
    </div>`;
  }

  updateGK();
}

function updateGK(){
  let n=document.getElementById("count").value;
  let g1=document.getElementById("gk1");
  let g2=document.getElementById("gk2");
  g1.innerHTML=""; g2.innerHTML="";

  for(let i=0;i<n;i++){
    let name=document.getElementById("p"+i)?.value||"P"+(i+1);
    g1.innerHTML+=`<option value="${i}">${name}</option>`;
    g2.innerHTML+=`<option value="${i}">${name}</option>`;
  }
}

function getPlayers(){
  let n=document.getElementById("count").value;
  let arr=[];
  for(let i=0;i<n;i++){
    arr.push({
      name:document.getElementById("p"+i).value||"P"+(i+1),
      starter:document.getElementById("s"+i).checked,
      minutes:0
    });
  }
  return arr;
}

function generate(){

  let match=+document.getElementById("match").value;
  let interval=+document.getElementById("interval").value;

  players=getPlayers();

  let starters=players.filter(p=>p.starter);
  if(starters.length!==onfield){
    alert("Starters must match outfield players");
    return;
  }

  current=[...starters];
  renderMinutes();
}

function start(){
  if(timer) return;
  timer=setInterval(()=>{
    sec++;

    let m=Math.floor(sec/60).toString().padStart(2,'0');
    let s=(sec%60).toString().padStart(2,'0');
    document.getElementById("clock").innerText=m+":"+s;

    // add live minutes
    current.forEach(p=>p.minutes+=1/60);

    renderMinutes();

  },1000);
}

function pause(){ clearInterval(timer); timer=null; }
function reset(){ pause(); sec=0; players.forEach(p=>p.minutes=0); renderMinutes(); }

function renderMinutes(){
  let total=+document.getElementById("match").value;

  let html="";
  players.forEach(p=>{
    let percent=(p.minutes/total)*100;
    html+=`
      <div>${p.name} (${p.minutes.toFixed(1)}m)</div>
      <div class="barWrap">
        <div class="bar" style="width:${percent}%"></div>
      </div>
    `;
  });

  document.getElementById("minutes").innerHTML=html;
}

setFormat();
renderPlayers();

</script>

</body>
</html>
