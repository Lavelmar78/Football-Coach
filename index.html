<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Coach Pro Elite</title>

<style>
body { font-family:-apple-system; margin:0; background:#f5f5f5; }
header { background:#111; color:#fff; padding:12px; text-align:center; }

.screen { display:none; padding:10px 10px 70px; }
.active { display:block; }

.tabbar {
  position:fixed; bottom:0; width:100%;
  display:flex; background:#fff; border-top:1px solid #ccc;
}
.tabbar button { flex:1; padding:10px; border:none; background:none; }

.card { background:#fff; padding:10px; margin-bottom:10px; border-radius:8px; }

.player { border-bottom:1px solid #eee; padding:6px 0; }

.line {
  border:2px dashed #ccc;
  min-height:70px;
  margin-bottom:6px;
  display:flex;
  justify-content:center;
  flex-wrap:wrap;
}

.token {
  background:#4CAF50; color:#fff;
  padding:5px; margin:3px;
  border-radius:4px; font-size:12px;
}

.big { font-size:26px; text-align:center; }
.highlight { background:#ffeeba; padding:10px; text-align:center; }

.barWrap { background:#eee; }
.bar { height:10px; background:#4CAF50; }
</style>
</head>

<body>

<header>⚽ Coach Pro Elite</header>

<!-- SETUP -->
<div id="setup" class="screen active">
<div class="card">

<label>Format</label>
<select id="format" onchange="setFormat()">
<option value="7">7-a-side</option>
<option value="5">5-a-side</option>
<option value="9">9-a-side</option>
<option value="11">11-a-side</option>
</select>

<label>Formation</label>
<select id="formation">
<option value="2-3-1">2-3-1</option>
<option value="3-2-1">3-2-1</option>
<option value="3-3">3-3</option>
<option value="2-2-2">2-2-2</option>
</select>

<input id="match" value="40">
<input id="interval" value="5">

<label>Squad Size</label>
<input id="count" value="10" onchange="renderPlayers()">

<div id="players"></div>

<h4>Goalkeepers</h4>
<select id="gk1"></select>
<select id="gk2"></select>

<button onclick="generate(); showTab('plan')">Generate Plan</button>

</div>
</div>

<!-- PLAN -->
<div id="plan" class="screen">
<div class="card">
<h3>Plan</h3>
<div id="planTable"></div>
</div>

<div class="card">
<h3>Formation</h3>
<div id="pitch"></div>
</div>
</div>

<!-- MATCH -->
<div id="matchScreen" class="screen">
<div class="card big" id="clock">00:00</div>
<div class="card highlight" id="next">Next sub</div>
<button onclick="start()">Start</button>
<button onclick="pause()">Pause</button>
<button onclick="nextSub()">Next Sub</button>
</div>

<!-- STATS -->
<div id="stats" class="screen">
<div class="card">
<h3>Minutes</h3>
<div id="minutes"></div>
</div>
</div>

<div class="tabbar">
<button onclick="showTab('setup')">Setup</button>
<button onclick="showTab('plan')">Plan</button>
<button onclick="showTab('matchScreen')">Match</button>
<button onclick="showTab('stats')">Stats</button>
</div>

<script>

let players=[], plan=[], current=[], sec=0, timer=null, index=0, onfield=6;

/* NAV */
function showTab(id){
  document.querySelectorAll(".screen").forEach(s=>s.classList.remove("active"));
  document.getElementById(id).classList.add("active");
}

/* FORMAT */
function setFormat(){
  onfield=document.getElementById("format").value-1;
}

/* RENDER PLAYERS */
function renderPlayers(){
  let n = document.getElementById("count").value;
  let html = "";

  for(let i=0;i<n;i++){
    html += `
    <div class="player">
      <input id="p${i}" placeholder="Player ${i+1}">
      <label><input type="checkbox" id="s${i}"> Starter</label><br>
      <label><input type="checkbox" id="def${i}">DEF</label>
      <label><input type="checkbox" id="mid${i}">MID</label>
      <label><input type="checkbox" id="att${i}">ATT</label>
    </div>`;
  }

  document.getElementById("players").innerHTML = html;
  updateGK();
}

/* GK */
function updateGK(){
  let n = document.getElementById("count").value;
  let html = "";

  for(let i=0;i<n;i++){
    let name = document.getElementById("p"+i)?.value || "P"+(i+1);
    html += `<option value="${i}">${name}</option>`;
  }

  document.getElementById("gk1").innerHTML = html;
  document.getElementById("gk2").innerHTML = html;
}

/* DATA */
function getPlayers(){
  let n = document.getElementById("count").value;
  let arr = [];

  for(let i=0;i<n;i++){
    arr.push({
      name: document.getElementById("p"+i).value || "P"+(i+1),
      starter: document.getElementById("s"+i).checked,
      minutes: 0,
      pos: {
        def: document.getElementById("def"+i).checked,
        mid: document.getElementById("mid"+i).checked,
        att: document.getElementById("att"+i).checked
      }
    });
  }

  return arr;
}

/* SMART PLAN */
function generate(){

  players = getPlayers();
  current = players.filter(p => p.starter);

  let match = +document.getElementById("match").value;
  let interval = +document.getElementById("interval").value;
  let slots = Math.floor(match / interval);

  plan = [];

  for(let i=1;i<slots;i++){

    let off = [...current].sort((a,b)=>b.minutes-a.minutes)[0];

    let bench = players.filter(p => !current.includes(p));

    let same = bench.filter(p => samePos(p, off))
                    .sort((a,b)=>a.minutes-b.minutes);

    let on = same[0] || bench.sort((a,b)=>a.minutes-b.minutes)[0];

    if(off && on){
      current = current.filter(p => p !== off);
      current.push(on);

      plan.push({
        time: i*interval,
        off: off.name,
        on: on.name
      });
    }
  }

  buildPlan();
  buildPitch();
  index = 0;
  updateNext();
}

function samePos(a,b){
  return (a.pos.def && b.pos.def) ||
         (a.pos.mid && b.pos.mid) ||
         (a.pos.att && b.pos.att);
}

/* PLAN UI */
function buildPlan(){
  let html = "<table><tr><th>Time</th><th>Off</th><th>On</th></tr>";
  plan.forEach(p=>{
    html += `<tr><td>${p.time}</td><td>${p.off}</td><td>${p.on}</td></tr>`;
  });
  html += "</table>";
  document.getElementById("planTable").innerHTML = html;
}

/* PITCH */
function buildPitch(){

  document.getElementById("pitch").innerHTML = `
    <div class="line" id="att"></div>
    <div class="line" id="mid"></div>
    <div class="line" id="def"></div>
  `;

  current.forEach(p=>{
    let el = document.createElement("div");
    el.className = "token";
    el.innerText = p.name;

    let target = p.pos.att ? "att" : p.pos.mid ? "mid" : "def";
    document.getElementById(target).appendChild(el);
  });
}

/* MATCH */
function start(){
  if(timer) return;
  timer=setInterval(()=>{
    sec++;
    document.getElementById("clock").innerText = format(sec);
    current.forEach(p=>p.minutes+=1/60);
    renderMinutes();
  },1000);
}

function pause(){ clearInterval(timer); timer=null; }

function nextSub(){ index++; updateNext(); }

function updateNext(){
  if(index>=plan.length){
    document.getElementById("next").innerText="Done";
    return;
  }
  let p=plan[index];
  document.getElementById("next").innerText =
    `${p.off} → ${p.on} @ ${p.time}m`;
}

/* STATS */
function renderMinutes(){
  let total=+document.getElementById("match").value;
  let html="";
  players.forEach(p=>{
    let percent=(p.minutes/total)*100;
    html+=`${p.name}
    <div class="barWrap"><div class="bar" style="width:${percent}%"></div></div>`;
  });
  document.getElementById("minutes").innerHTML=html;
}

/* UTIL */
function format(s){
  let m=Math.floor(s/60).toString().padStart(2,'0');
  let ss=(s%60).toString().padStart(2,'0');
  return m+":"+ss;
}

/* INIT */
setFormat();
renderPlayers();

</script>

</body>
</html>
