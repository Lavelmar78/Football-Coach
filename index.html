<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Coach Pro Elite</title>

<style>
body { font-family:-apple-system; margin:0; background:#f5f5f5; }
header { background:#111; color:#fff; padding:12px; text-align:center; }

.screen { display:none; padding:10px 10px 70px; }
.active { display:block; }

.tabbar {
  position:fixed; bottom:0; width:100%;
  display:flex; background:#fff; border-top:1px solid #ccc;
}
.tabbar button { flex:1; padding:10px; }

.card { background:#fff; padding:10px; margin-bottom:10px; border-radius:8px; }
.player { border-bottom:1px solid #eee; padding:6px 0; }

.highlight { background:#ffeeba; padding:10px; text-align:center; }
</style>
</head>

<body>

<header>⚽ Coach Pro Elite</header>

<!-- SETUP -->
<div id="setup" class="screen active">
<div class="card">

<label>Match Length (mins)</label>
<input id="match" value="40">

<label>Sub Window (mins, optional)</label>
<input id="block">

<label>Squad Size</label>
<input id="count" value="10" onchange="renderPlayers()">

<div id="players"></div>

<button onclick="saveSquad()">Save Squad</button>

<h4>Goalkeepers</h4>
<select id="gk1"></select>
<select id="gk2"></select>

<button onclick="generate(); showTab('plan')">Generate Plan</button>

</div>
</div>

<!-- PLAN -->
<div id="plan" class="screen">
<div class="card">
<h3>Plan</h3>
<div id="planTable"></div>
</div>

<div class="card">
<h3>Minutes</h3>
<div id="minutesTable"></div>
</div>
</div>

<!-- MATCH -->
<div id="matchScreen" class="screen">
<div id="suggestion" class="highlight">Suggestion</div>
<button onclick="nextBlock()">Next Block</button>
</div>

<div class="tabbar">
<button onclick="showTab('setup')">Setup</button>
<button onclick="showTab('plan')">Plan</button>
<button onclick="showTab('matchScreen')">Match</button>
</div>

<script>

let players=[], blocks=[], index=0;

/* NAV */
function showTab(id){
  document.querySelectorAll(".screen").forEach(s=>s.classList.remove("active"));
  document.getElementById(id).classList.add("active");
}

/* RENDER PLAYERS (FIXED) */
function renderPlayers(){

  let container = document.getElementById("players");
  let saved = JSON.parse(localStorage.getItem("squad") || "[]");

  let n = parseInt(document.getElementById("count").value);
  let html = "";

  for(let i=0;i<n;i++){

    let p = saved[i] || {};

    html += `
    <div class="player">
      <input id="p${i}" value="${p.name||""}" placeholder="Player" oninput="updateGK()">
      <br>
      <label><input type="checkbox" id="def${i}" ${p.def?"checked":""}>DEF</label>
      <label><input type="checkbox" id="midc${i}" ${p.midc?"checked":""}>MID-C</label>
      <label><input type="checkbox" id="midw${i}" ${p.midw?"checked":""}>MID-W</label>
      <label><input type="checkbox" id="att${i}" ${p.att?"checked":""}>ATT</label>
    </div>`;
  }

  container.innerHTML = html;
  updateGK();
}

/* SAVE */
function saveSquad(){
  let arr=[];
  let n = parseInt(document.getElementById("count").value);

  for(let i=0;i<n;i++){
    arr.push({
      name:getVal("p"+i),
      def:getCheck("def"+i),
      midc:getCheck("midc"+i),
      midw:getCheck("midw"+i),
      att:getCheck("att"+i)
    });
  }

  localStorage.setItem("squad", JSON.stringify(arr));
}

/* HELPERS */
function getVal(id){ return document.getElementById(id)?.value || ""; }
function getCheck(id){ return document.getElementById(id)?.checked || false; }

/* GK UPDATE (FIXED) */
function updateGK(){

  let n = parseInt(document.getElementById("count").value);
  let html = "";

  for(let i=0;i<n;i++){
    let name = getVal("p"+i) || "P"+(i+1);
    html += `<option value="${i}">${name}</option>`;
  }

  document.getElementById("gk1").innerHTML = html;
  document.getElementById("gk2").innerHTML = html;
}

/* GENERATE */
function generate(){

  players=[];
  let n = parseInt(document.getElementById("count").value);

  for(let i=0;i<n;i++){
    players.push({
      name:getVal("p"+i) || "P"+(i+1),
      minutes:0
    });
  }

  let matchLen = parseFloat(document.getElementById("match").value);
  let blockInput = parseFloat(document.getElementById("block").value);

  let block = (!blockInput || blockInput < 6) ? 6 : blockInput;

  let blocksCount = Math.floor(matchLen / block);

  blocks=[];

  for(let i=0;i<blocksCount;i++){

    players.sort((a,b)=>a.minutes-b.minutes);

    let lineup = players.slice(0,7);

    lineup.forEach(p=>p.minutes += block);

    blocks.push({time:i*block,lineup});
  }

  buildPlan();
  buildMinutes();
}

/* PLAN */
function buildPlan(){
  let html="";
  blocks.forEach(b=>{
    html+=`<div><b>${b.time}m</b>: ${b.lineup.map(p=>p.name).join(", ")}</div>`;
  });
  document.getElementById("planTable").innerHTML=html;
}

/* MINUTES */
function buildMinutes(){
  let html="";
  players.forEach(p=>{
    html+=`${p.name}: ${p.minutes.toFixed(1)} mins<br>`;
  });
  document.getElementById("minutesTable").innerHTML=html;
}

/* LIVE */
function nextBlock(){

  index++;

  let current=blocks[index];
  if(!current) return;

  let off=[...current.lineup].sort((a,b)=>b.minutes-a.minutes)[0];
  let bench=players.filter(p=>!current.lineup.includes(p));

  let on=[...bench].sort((a,b)=>a.minutes-b.minutes)[0];

  document.getElementById("suggestion").innerText =
    `Suggested: OFF ${off.name} / ON ${on.name}`;
}

/* INIT */
renderPlayers();

</script>

</body>
</html>
