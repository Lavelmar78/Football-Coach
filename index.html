<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Coach Pro Elite</title>

<style>
body { font-family:-apple-system; margin:0; background:#f5f5f5; }
header { background:#111; color:#fff; padding:12px; text-align:center; }

.screen { display:none; padding:10px 10px 70px; }
.active { display:block; }

.tabbar {
  position:fixed; bottom:0; width:100%;
  display:flex; background:#fff; border-top:1px solid #ccc;
}
.tabbar button { flex:1; padding:10px; }

.card { background:#fff; padding:10px; margin-bottom:10px; border-radius:8px; }

.player { border-bottom:1px solid #eee; padding:6px 0; }

.pitch {
  position:relative;
  height:300px;
  background:linear-gradient(#4CAF50,#388E3C);
  border-radius:8px;
}

.token {
  position:absolute;
  background:#fff;
  padding:4px;
  border-radius:4px;
  font-size:11px;
  transform:translate(-50%,-50%);
}

.highlight { background:#ffeeba; padding:10px; text-align:center; }
</style>
</head>

<body>

<header>⚽ Coach Pro Elite</header>

<!-- SETUP -->
<div id="setup" class="screen active">
<div class="card">

<label>Match Length (mins)</label>
<input id="match" value="40">

<label>Sub Window (mins, optional)</label>
<input id="block">

<label>Squad Size</label>
<input id="count" value="10" onchange="renderPlayers()">

<label>Formation</label>
<select id="formation">
<option value="2-3-1">2-3-1</option>
<option value="3-2-1">3-2-1</option>
<option value="3-3">3-3</option>
</select>

<div id="players"></div>

<button onclick="saveSquad()">Save Squad</button>

<h4>Goalkeepers</h4>
<select id="gk1"></select>
<select id="gk2"></select>

<button onclick="generate(); showTab('plan')">Generate Plan</button>

</div>
</div>

<!-- PLAN -->
<div id="plan" class="screen">
<div class="card">
<h3>Plan</h3>
<div id="planTable"></div>
</div>

<div class="card">
<h3>Minutes</h3>
<div id="minutesTable"></div>
</div>

<div class="card">
<h3>Pitch</h3>
<div id="pitch" class="pitch"></div>
</div>
</div>

<!-- MATCH -->
<div id="matchScreen" class="screen">
<div id="suggestion" class="highlight">Suggestion</div>
<button onclick="nextBlock()">Next Block</button>
</div>

<div class="tabbar">
<button onclick="showTab('setup')">Setup</button>
<button onclick="showTab('plan')">Plan</button>
<button onclick="showTab('matchScreen')">Match</button>
</div>

<script>

let players=[], blocks=[], index=0;

/* NAV */
function showTab(id){
  document.querySelectorAll(".screen").forEach(s=>s.classList.remove("active"));
  document.getElementById(id).classList.add("active");
}

/* PLAYERS */
function renderPlayers(){

  let saved = JSON.parse(localStorage.getItem("squad") || "[]");

  let n = count.value;
  let html="";

  for(let i=0;i<n;i++){

    let p = saved[i] || {};

    html += `
    <div class="player">
      <input id="p${i}" value="${p.name||""}" placeholder="Player">
      <br>
      <label><input type="checkbox" id="def${i}" ${p.def?"checked":""}>DEF</label>
      <label><input type="checkbox" id="midc${i}" ${p.midc?"checked":""}>MID-C</label>
      <label><input type="checkbox" id="midw${i}" ${p.midw?"checked":""}>MID-W</label>
      <label><input type="checkbox" id="att${i}" ${p.att?"checked":""}>ATT</label>
    </div>`;
  }

  playersDiv.innerHTML = html;
  updateGK();
}

/* SAVE */
function saveSquad(){
  let arr=[];
  for(let i=0;i<count.value;i++){
    arr.push({
      name:p(i),
      def:def(i),
      midc:midc(i),
      midw:midw(i),
      att:att(i)
    });
  }
  localStorage.setItem("squad", JSON.stringify(arr));
}

/* HELPERS */
function p(i){return document.getElementById("p"+i).value;}
function def(i){return document.getElementById("def"+i).checked;}
function midc(i){return document.getElementById("midc"+i).checked;}
function midw(i){return document.getElementById("midw"+i).checked;}
function att(i){return document.getElementById("att"+i).checked;}

/* GK */
function updateGK(){
  let html="";
  for(let i=0;i<count.value;i++){
    html+=`<option value="${i}">${p(i)||"P"+(i+1)}</option>`;
  }
  gk1.innerHTML=html;
  gk2.innerHTML=html;
}

/* GENERATE */
function generate(){

  players=[];
  for(let i=0;i<count.value;i++){
    players.push({
      name:p(i)||"P"+(i+1),
      minutes:0,
      pos:{def:def(i),midc:midc(i),midw:midw(i),att:att(i)}
    });
  }

  let match=+match.value;
  let block=+block.value || 6;

  let blocksCount=Math.floor(match/block);

  let ideal=(match*(players.length-3))/players.length;

  blocks=[];

  for(let i=0;i<blocksCount;i++){

    players.sort((a,b)=>a.minutes-b.minutes);

    let lineup=players.slice(0,7);

    lineup.forEach(p=>p.minutes+=block);

    blocks.push({time:i*block,lineup});
  }

  buildPlan();
  buildMinutes();
}

/* PLAN */
function buildPlan(){
  let html="";
  blocks.forEach(b=>{
    html+=`<div><b>${b.time}m</b>: ${b.lineup.map(p=>p.name).join(", ")}</div>`;
  });
  planTable.innerHTML=html;
}

/* MINUTES */
function buildMinutes(){
  let html="";
  players.forEach(p=>{
    html+=`${p.name}: ${p.minutes.toFixed(1)} mins<br>`;
  });
  minutesTable.innerHTML=html;
}

/* LIVE SUGGEST */
function nextBlock(){

  index++;

  let current=blocks[index];
  if(!current) return;

  let off=current.lineup.sort((a,b)=>b.minutes-a.minutes)[0];
  let bench=players.filter(p=>!current.lineup.includes(p));

  let on=bench.sort((a,b)=>a.minutes-b.minutes)[0];

  suggestion.innerText=`Suggested: OFF ${off.name} / ON ${on.name}`;
}

/* INIT */
renderPlayers();

</script>

</body>
</html>
