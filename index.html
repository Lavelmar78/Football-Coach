<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Coach Pro Elite</title>

<style>
body { font-family:-apple-system; margin:0; background:#f5f5f5; }
header { background:#111; color:#fff; padding:12px; text-align:center; }

.screen { display:none; padding:10px 10px 70px; }
.active { display:block; }

.tabbar {
  position:fixed; bottom:0; width:100%;
  display:flex; background:#fff; border-top:1px solid #ccc;
}
.tabbar button { flex:1; padding:10px; border:none; }

.card { background:#fff; padding:10px; margin-bottom:10px; border-radius:8px; }
.player { border-bottom:1px solid #eee; padding:6px 0; }

.pitch {
  position:relative;
  height:300px;
  background:linear-gradient(#4CAF50,#388E3C);
  border-radius:8px;
}

.token {
  position:absolute;
  background:#fff;
  padding:4px;
  border-radius:4px;
  font-size:11px;
  transform:translate(-50%,-50%);
}

.big { font-size:26px; text-align:center; }
.highlight { background:#ffeeba; padding:10px; text-align:center; }
</style>
</head>

<body>

<header>⚽ Coach Pro Elite</header>

<!-- SETUP -->
<div id="setup" class="screen active">
<div class="card">

<label>Formation</label>
<select id="formation">
<option value="2-3-1">2-3-1</option>
<option value="3-2-1">3-2-1</option>
<option value="3-3">3-3</option>
<option value="2-2-2">2-2-2</option>
</select>

<input id="match" value="40">
<input id="block" value="6">
<input id="count" value="10" onchange="renderPlayers()">

<div id="players"></div>

<h4>Goalkeepers</h4>
<select id="gk1"></select>
<select id="gk2"></select>

<button onclick="generate(); showTab('plan')">Generate Plan</button>

</div>
</div>

<!-- PLAN -->
<div id="plan" class="screen">
<div class="card">
<h3>Rotation Plan</h3>
<div id="planTable"></div>
</div>

<div class="card">
<h3>Formation</h3>
<div id="pitch" class="pitch"></div>
</div>
</div>

<!-- MATCH -->
<div id="matchScreen" class="screen">
<div class="card big" id="clock">00:00</div>
<div class="card highlight" id="next">Next change</div>
<button onclick="start()">Start</button>
<button onclick="pause()">Pause</button>
<button onclick="nextBlock()">Next Block</button>
</div>

<div class="tabbar">
<button onclick="showTab('setup')">Setup</button>
<button onclick="showTab('plan')">Plan</button>
<button onclick="showTab('matchScreen')">Match</button>
</div>

<script>

let players=[], blocks=[], current=[], index=0, sec=0, timer=null;

/* NAV */
function showTab(id){
  document.querySelectorAll(".screen").forEach(s=>s.classList.remove("active"));
  document.getElementById(id).classList.add("active");
}

/* RENDER PLAYERS */
function renderPlayers(){
  let n = document.getElementById("count").value;
  let html = "";

  for(let i=0;i<n;i++){
    html += `
    <div class="player">
      <input id="p${i}" placeholder="Player ${i+1}">
      <label><input type="checkbox" id="s${i}"> Starter</label><br>
      <label><input type="checkbox" id="def${i}">DEF</label>
      <label><input type="checkbox" id="mid${i}">MID</label>
      <label><input type="checkbox" id="att${i}">ATT</label>
    </div>`;
  }

  document.getElementById("players").innerHTML = html;
  updateGK();
}

/* GK DROPDOWN */
function updateGK(){
  let n = document.getElementById("count").value;
  let html = "";

  for(let i=0;i<n;i++){
    let name = document.getElementById("p"+i)?.value || "P"+(i+1);
    html += `<option value="${i}">${name}</option>`;
  }

  document.getElementById("gk1").innerHTML = html;
  document.getElementById("gk2").innerHTML = html;
}

/* DATA */
function getPlayers(){
  let n = document.getElementById("count").value;
  let arr = [];

  for(let i=0;i<n;i++){
    arr.push({
      name: document.getElementById("p"+i).value || "P"+(i+1),
      starter: document.getElementById("s"+i).checked,
      minutes: 0,
      pos:{
        def: document.getElementById("def"+i).checked,
        mid: document.getElementById("mid"+i).checked,
        att: document.getElementById("att"+i).checked
      }
    });
  }

  return arr;
}

/* POSITION MATCH */
function fits(player, role){
  return player.pos[role] || (!player.pos.def && !player.pos.mid && !player.pos.att);
}

/* GENERATE PLAN */
function generate(){

  players = getPlayers();

  let match = +document.getElementById("match").value;
  let block = Math.max(6, +document.getElementById("block").value);
  let totalBlocks = Math.floor(match / block);

  let formation = document.getElementById("formation").value.split("-");
  let roles = [
    ...Array(+formation[0]).fill("def"),
    ...Array(+formation[1]).fill("mid"),
    ...Array(+formation[2]).fill("att")
  ];

  let gk1 = players[document.getElementById("gk1").value];
  let gk2 = players[document.getElementById("gk2").value];

  blocks = [];

  for(let i=0;i<totalBlocks;i++){

    let half = i < totalBlocks/2 ? 1 : 2;
    let gk = half === 1 ? gk1 : gk2;

    let lineup = [gk];

    let available = players.filter(p => p !== gk);

    roles.forEach(role=>{
      let candidates = available
        .filter(p=>fits(p,role))
        .sort((a,b)=>a.minutes - b.minutes);

      let pick = candidates[0] || available.sort((a,b)=>a.minutes-b.minutes)[0];

      lineup.push(pick);
      available = available.filter(p=>p!==pick);
    });

    lineup.forEach(p=>p.minutes += block);

    blocks.push({
      time: i*block,
      lineup: lineup.map(p=>p.name)
    });
  }

  buildPlan();
  current = blocks[0].lineup;
  drawFormation(current);

  index = 0;
  updateNext();
}

/* PLAN UI */
function buildPlan(){
  let html="";
  blocks.forEach(b=>{
    html+=`<div><b>${b.time}m</b>: ${b.lineup.join(", ")}</div>`;
  });
  document.getElementById("planTable").innerHTML=html;
}

/* FORMATION */
function drawFormation(lineup){

  let pitch = document.getElementById("pitch");
  pitch.innerHTML = "";

  let f = document.getElementById("formation").value.split("-");

  let rows = [
    {y:15,count:1}, // GK
    {y:35,count:+f[0]},
    {y:60,count:+f[1]},
    {y:85,count:+f[2]}
  ];

  let i = 0;

  rows.forEach(r=>{
    for(let j=0;j<r.count;j++){

      if(!lineup[i]) continue;

      let x = (j+1)/(r.count+1)*100;

      let el = document.createElement("div");
      el.className = "token";
      el.innerText = lineup[i];

      el.style.left = x+"%";
      el.style.top = r.y+"%";

      pitch.appendChild(el);

      i++;
    }
  });
}

/* MATCH */
function start(){
  if(timer) return;
  timer=setInterval(()=>{
    sec++;
    document.getElementById("clock").innerText = format(sec);
  },1000);
}

function pause(){ clearInterval(timer); timer=null; }

function nextBlock(){
  index++;
  if(index>=blocks.length) return;
  current = blocks[index].lineup;
  drawFormation(current);
  updateNext();
}

function updateNext(){
  if(index>=blocks.length-1){
    document.getElementById("next").innerText="Done";
    return;
  }
  document.getElementById("next").innerText =
    "Next change @ "+blocks[index+1].time+"m";
}

/* UTIL */
function format(s){
  let m=Math.floor(s/60).toString().padStart(2,'0');
  let ss=(s%60).toString().padStart(2,'0');
  return m+":"+ss;
}

/* INIT */
renderPlayers();

</script>

</body>
</html>
