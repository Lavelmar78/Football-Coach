<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Coach Pro Elite</title>

<style>
body { font-family:-apple-system; margin:0; background:#f5f5f5; }
header { background:#111; color:#fff; padding:12px; text-align:center; }

.screen { display:none; padding:10px 10px 80px; }
.active { display:block; }

.tabbar {
  position:fixed; bottom:0; width:100%;
  display:flex; background:#fff; border-top:1px solid #ccc;
}
.tabbar button { flex:1; padding:10px; }

.card { background:#fff; padding:10px; margin-bottom:10px; border-radius:8px; }

.player { border-bottom:1px solid #eee; padding:6px 0; }

.pitch {
  position:relative;
  height:320px;
  background:linear-gradient(#4CAF50,#388E3C);
  border-radius:8px;
}

.token {
  position:absolute;
  background:#fff;
  padding:4px;
  border-radius:4px;
  font-size:11px;
  transform:translate(-50%,-50%);
}

.highlight { background:#ffeeba; padding:10px; text-align:center; }
.timer { font-size:28px; text-align:center; margin:10px 0; }
</style>
</head>

<body>

<header>⚽ Coach Pro Elite</header>

<div id="setup" class="screen active">
<div class="card">

<label>Match Length</label>
<input id="matchLength" value="40">

<label>Sub Window</label>
<input id="subWindow" value="6">

<label>Squad Size</label>
<input id="count" value="11">

<label>
<input type="checkbox" id="gkMode" checked>
GK full match mode
</label>

<div id="playersContainer"></div>

<button onclick="saveSquad()">Save Squad</button>

<h4>Goalkeepers</h4>
<select id="gk1"></select>
<select id="gk2"></select>

<button onclick="generatePlan(); showTab('plan')">Generate Plan</button>

</div>
</div>

<div id="plan" class="screen">
<div class="card">
<h3>Plan</h3>
<div id="planTable"></div>
</div>

<div class="card">
<h3>Minutes</h3>
<div id="minutesTable"></div>
</div>

<div class="card">
<div id="pitch" class="pitch"></div>
</div>
</div>

<div id="matchScreen" class="screen">
<div class="timer" id="clock">00:00</div>
<div id="nextChange" class="highlight"></div>
<div id="nextSub" class="highlight"></div>

<button onclick="startMatch()">Start</button>
<button onclick="pauseMatch()">Pause</button>
<button onclick="resetMatch()">Reset</button>
<button onclick="nextBlock()">Next Block</button>
</div>

<div class="tabbar">
<button onclick="showTab('setup')">Setup</button>
<button onclick="showTab('plan')">Plan</button>
<button onclick="showTab('matchScreen')">Match</button>
</div>

<script>

let playersData = [];
let blocks = [];
let currentIndex = 0;
let timer = null;
let seconds = 0;

/* HELPERS */
function getVal(id){ return document.getElementById(id)?.value || ""; }
function getChk(id){ return document.getElementById(id)?.checked || false; }

/* NAV */
function showTab(id){
  document.querySelectorAll(".screen").forEach(s=>s.classList.remove("active"));
  document.getElementById(id).classList.add("active");
}

/* RENDER PLAYERS */
function renderPlayers(){

  const container = document.getElementById("playersContainer");
  const saved = JSON.parse(localStorage.getItem("squad")||"[]");
  const n = parseInt(getVal("count")) || 0;

  let html = "";

  for(let i=0;i<n;i++){
    let p = saved[i] || {};

    html += `
    <div class="player">
      <input id="p${i}" value="${p.name||""}" placeholder="Player" oninput="updateGK()">
      <label><input type="checkbox" id="avail${i}" ${p.avail!==false?"checked":""}>Avail</label><br>
      <label><input type="checkbox" id="def${i}" ${p.def?"checked":""}>DEF</label>
      <label><input type="checkbox" id="midc${i}" ${p.midc?"checked":""}>MID-C</label>
      <label><input type="checkbox" id="midw${i}" ${p.midw?"checked":""}>MID-W</label>
      <label><input type="checkbox" id="att${i}" ${p.att?"checked":""}>ATT</label>
    </div>`;
  }

  container.innerHTML = html;
  updateGK();
}

/* SAVE */
function saveSquad(){
  let arr=[];
  let n = parseInt(getVal("count"));

  for(let i=0;i<n;i++){
    arr.push({
      name:getVal("p"+i),
      avail:getChk("avail"+i),
      def:getChk("def"+i),
      midc:getChk("midc"+i),
      midw:getChk("midw"+i),
      att:getChk("att"+i)
    });
  }

  localStorage.setItem("squad", JSON.stringify(arr));
}

/* GK */
function updateGK(){
  let html="";
  let n=parseInt(getVal("count"));

  for(let i=0;i<n;i++){
    if(!getChk("avail"+i)) continue;
    let name=getVal("p"+i)||"P"+(i+1);
    html+=`<option>${name}</option>`;
  }

  document.getElementById("gk1").innerHTML = html;
  document.getElementById("gk2").innerHTML = html;
}

/* SHUFFLE */
function shuffle(arr){
  return arr.sort(()=>Math.random()-0.5);
}

/* GENERATE PLAN */
function generatePlan(){

  playersData = [];

  let n=parseInt(getVal("count"));

  for(let i=0;i<n;i++){
    if(!getChk("avail"+i)) continue;

    playersData.push({
      name:getVal("p"+i)||"P"+(i+1),
      minutes:0,
      pos:{
        def:getChk("def"+i),
        midc:getChk("midc"+i),
        midw:getChk("midw"+i),
        att:getChk("att"+i)
      }
    });
  }

  let block=Math.max(6,parseFloat(getVal("subWindow")));
  let totalBlocks=Math.floor(parseFloat(getVal("matchLength"))/block);
  let half=Math.floor(totalBlocks/2);

  let gk1p=playersData.find(p=>p.name===document.getElementById("gk1").value);
  let gk2p=playersData.find(p=>p.name===document.getElementById("gk2").value);

  blocks=[];

  for(let i=0;i<totalBlocks;i++){

    let gk=i<half?gk1p:gk2p;
    let lineup=[gk];

    let pool=playersData.filter(p=>p!==gk);

    function pick(role){
      let group=shuffle(pool.filter(p=>p.pos[role]));
      group.sort((a,b)=>a.minutes-b.minutes);
      if(group.length){
        let chosen=group[0];
        pool=pool.filter(p=>p!==chosen);
        return chosen;
      }
      return null;
    }

    ["midc","def","midw","att"].forEach(role=>{
      while(lineup.length<7){
        let p=pick(role);
        if(!p) break;
        lineup.push(p);
      }
    });

    while(lineup.length<7){
      lineup.push(pool.shift());
    }

    lineup.forEach(p=>p.minutes+=block);

    blocks.push({time:i*block,lineup});
  }

  buildPlan();
  buildMinutes();
  drawPitch(blocks[0].lineup);

  currentIndex=0;
  updateNextSub();
}

/* PLAN */
function buildPlan(){
  document.getElementById("planTable").innerHTML =
    blocks.map(b=>`<div><b>${b.time}m</b>: ${b.lineup.map(p=>p.name).join(", ")}</div>`).join("");
}

/* MINUTES */
function buildMinutes(){
  document.getElementById("minutesTable").innerHTML =
    playersData.map(p=>`${p.name}: ${p.minutes} mins`).join("<br>");
}

/* PITCH */
function drawPitch(lineup){

  let pitch=document.getElementById("pitch");
  pitch.innerHTML="";

  let layout=[1,2,3,1];
  let y=[10,35,60,85];

  let i=0;

  layout.forEach((count,row)=>{
    for(let j=0;j<count;j++){
      let p=lineup[i++];
      if(!p) continue;

      let el=document.createElement("div");
      el.className="token";
      el.innerText=p.name;

      el.style.left=((j+1)/(count+1)*100)+"%";
      el.style.top=y[row]+"%";

      pitch.appendChild(el);
    }
  });
}

/* MATCH */
function updateNextSub(){

  if(!blocks[currentIndex+1]) return;

  let current=blocks[currentIndex].lineup;
  let next=blocks[currentIndex+1].lineup;

  let off=current.filter(p=>!next.includes(p));
  let on=next.filter(p=>!current.includes(p));

  document.getElementById("nextSub").innerText =
    `Next: OFF ${off.map(p=>p.name).join(", ")} | ON ${on.map(p=>p.name).join(", ")}`;
}

/* TIMER */
function startMatch(){
  if(timer) return;

  timer=setInterval(()=>{
    seconds++;

    let m=Math.floor(seconds/60).toString().padStart(2,'0');
    let s=(seconds%60).toString().padStart(2,'0');

    clock.innerText=`${m}:${s}`;

    let block=parseFloat(getVal("subWindow"));
    let next=Math.ceil(seconds/60/block)*block;

    nextChange.innerText=`Next change at ${next} min`;

  },1000);
}

function pauseMatch(){ clearInterval(timer); timer=null; }
function resetMatch(){ pauseMatch(); seconds=0; clock.innerText="00:00"; }

/* NEXT */
function nextBlock(){
  currentIndex++;
  if(currentIndex>=blocks.length) return;

  drawPitch(blocks[currentIndex].lineup);
  updateNextSub();
}

/* INIT */
renderPlayers();

</script>

</body>
</html>
