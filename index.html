<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Coach Pro Elite</title>

<style>
body{
  margin:0;
  font-family:-apple-system,BlinkMacSystemFont,sans-serif;
  background:#f3f4f6;
  color:#111827;
}

header{
  background:#111827;
  color:white;
  text-align:center;
  padding:14px;
  font-size:20px;
  font-weight:700;
}

.screen{
  display:none;
  padding:12px 12px 90px;
}

.active{
  display:block;
}

.card{
  background:white;
  border-radius:14px;
  padding:14px;
  margin-bottom:14px;
  box-shadow:0 2px 6px rgba(0,0,0,.08);
}

input,select,button{
  width:100%;
  box-sizing:border-box;
  padding:10px;
  margin-top:6px;
  margin-bottom:10px;
  border-radius:10px;
  border:1px solid #d1d5db;
  font-size:15px;
}

button{
  background:#111827;
  color:white;
  border:none;
  font-weight:700;
}

.player{
  border-bottom:1px solid #e5e7eb;
  padding:10px 0;
}

.roles{
  display:flex;
  gap:12px;
  flex-wrap:wrap;
  margin-top:8px;
}

.roles label{
  font-size:12px;
}

.pitch{
  position:relative;
  height:420px;
  border-radius:12px;
  overflow:hidden;
  background:linear-gradient(#4CAF50,#2E7D32);
}

.token{
  position:absolute;
  transform:translate(-50%,-50%);
  background:white;
  border-radius:10px;
  padding:6px 8px;
  font-size:12px;
  font-weight:700;
  white-space:nowrap;
}

.planBlock{
  border-bottom:1px solid #eee;
  padding:10px 0;
}

.small{
  font-size:13px;
  color:#666;
}

.tabbar{
  position:fixed;
  bottom:0;
  width:100%;
  display:flex;
  background:white;
  border-top:1px solid #ddd;
}

.tabbar button{
  flex:1;
  margin:0;
  border-radius:0;
}

.highlight{
  background:#fef3c7;
  padding:12px;
  border-radius:10px;
  margin-bottom:10px;
  text-align:center;
}

.timer{
  font-size:42px;
  text-align:center;
  font-weight:700;
  margin:10px 0 20px;
}

.error{
  background:#fee2e2;
  color:#991b1b;
  padding:10px;
  border-radius:10px;
  margin-bottom:10px;
}
</style>
</head>

<body>

<header>⚽ Coach Pro Elite</header>

<div id="setup" class="screen active">

<div class="card">

<div id="errorBox"></div>

<label>Match Length (mins)</label>
<input id="matchLength" type="number" value="52">

<label>Squad Size</label>
<input id="count" type="number" value="11">

<label>
<input type="checkbox" id="gkMode" checked>
Off-goal keeper plays outfield
</label>

<button onclick="renderPlayers()">
Build Squad Inputs
</button>

<div id="playersContainer"></div>

<button onclick="saveSquad()">
Save Squad
</button>

<h3>Goalkeepers</h3>

<label>1st Half GK</label>
<select id="gk1"></select>

<label>2nd Half GK</label>
<select id="gk2"></select>

<button onclick="generatePlan();showTab('plan')">
Generate Match Plan
</button>

</div>

</div>

<div id="plan" class="screen">

<div class="card">
<h3>Rotation Plan</h3>
<div id="planTable"></div>
</div>

<div class="card">
<h3>Minutes</h3>
<div id="minutesTable"></div>
</div>

<div class="card">
<h3>Tactical Board</h3>
<div id="pitch" class="pitch"></div>
</div>

</div>

<div id="matchScreen" class="screen">

<div class="timer" id="clock">00:00</div>

<div class="highlight" id="nextChange">
Next change:
</div>

<div class="highlight" id="nextSub">
Upcoming subs:
</div>

<button onclick="startMatch()">Start Match</button>
<button onclick="pauseMatch()">Pause</button>
<button onclick="resetMatch()">Reset</button>
<button onclick="nextBlock()">Next Change</button>

</div>

<div class="tabbar">
<button onclick="showTab('setup')">Setup</button>
<button onclick="showTab('plan')">Plan</button>
<button onclick="showTab('matchScreen')">Match</button>
</div>

<script>

let playersData=[];
let blocks=[];
let currentIndex=0;
let timer=null;
let seconds=0;

function val(id){
  return document.getElementById(id)?.value || "";
}

function chk(id){
  return document.getElementById(id)?.checked || false;
}

function showError(msg){
  errorBox.innerHTML=`<div class="error">${msg}</div>`;
}

function clearError(){
  errorBox.innerHTML="";
}

function showTab(id){

  document
    .querySelectorAll(".screen")
    .forEach(s=>s.classList.remove("active"));

  document
    .getElementById(id)
    .classList.add("active");
}

function renderPlayers(){

  const saved=
    JSON.parse(
      localStorage.getItem("coachSquad") || "[]"
    );

  let html="";

  for(let i=0;i<Number(val("count"));i++){

    const p=saved[i] || {};

    html+=`
    <div class="player">

      <input
        id="p${i}"
        value="${p.name || ""}"
        placeholder="Player Name"
        oninput="updateGKSelectors()"
      >

      <label>
        <input
          type="checkbox"
          id="avail${i}"
          ${p.available!==false?"checked":""}
        >
        Available
      </label>

      <div class="roles">

        <label>
          <input type="checkbox"
            id="def${i}"
            ${p.def?"checked":""}>
          DEF
        </label>

        <label>
          <input type="checkbox"
            id="midc${i}"
            ${p.midc?"checked":""}>
          MID-C
        </label>

        <label>
          <input type="checkbox"
            id="midw${i}"
            ${p.midw?"checked":""}>
          MID-W
        </label>

        <label>
          <input type="checkbox"
            id="att${i}"
            ${p.att?"checked":""}>
          ATT
        </label>

      </div>

    </div>
    `;
  }

  playersContainer.innerHTML=html;

  updateGKSelectors();
}

function saveSquad(){

  const squad=[];

  for(let i=0;i<Number(val("count"));i++){

    squad.push({
      name:val("p"+i),
      available:chk("avail"+i),
      def:chk("def"+i),
      midc:chk("midc"+i),
      midw:chk("midw"+i),
      att:chk("att"+i)
    });
  }

  localStorage.setItem(
    "coachSquad",
    JSON.stringify(squad)
  );
}

function updateGKSelectors(){

  let html="";

  for(let i=0;i<Number(val("count"));i++){

    if(!chk("avail"+i)) continue;

    const name=val("p"+i);

    if(!name) continue;

    html+=`<option>${name}</option>`;
  }

  gk1.innerHTML=html;
  gk2.innerHTML=html;
}

function shuffle(arr){

  const a=[...arr];

  for(let i=a.length-1;i>0;i--){

    const j=
      Math.floor(
        Math.random()*(i+1)
      );

    [a[i],a[j]]=
      [a[j],a[i]];
  }

  return a;
}

function generatePlan(){

  clearError();

  playersData=[];

  const matchLength=
    Number(val("matchLength"));

  if(matchLength<=0){
    showError("Invalid match length");
    return;
  }

  for(let i=0;i<Number(val("count"));i++){

    if(!chk("avail"+i)) continue;

    const name=val("p"+i).trim();

    if(!name) continue;

    playersData.push({
      name,
      totalMinutes:0,
      outfieldMinutes:0,
      positions:{
        def:chk("def"+i),
        midc:chk("midc"+i),
        midw:chk("midw"+i),
        att:chk("att"+i)
      }
    });
  }

  if(playersData.length<7){
    showError("Need at least 7 players");
    return;
  }

  const gk1Player=
    playersData.find(
      p=>p.name===val("gk1")
    );

  const gk2Player=
    playersData.find(
      p=>p.name===val("gk2")
    );

  if(!gk1Player || !gk2Player){
    showError("Select both keepers");
    return;
  }

  if(gk1Player===gk2Player){
    showError("Keepers must differ");
    return;
  }

  const fixedGKMode=
    chk("gkMode");

  blocks=[];

  playersData.forEach(p=>{
    p.totalMinutes=0;
    p.outfieldMinutes=0;
  });

  const halfLength=
    matchLength/2;

  const rotatingPlayers=
    fixedGKMode
    ? playersData.filter(
        p=>p!==gk1Player &&
           p!==gk2Player
      )
    : [...playersData];

  const totalOutfieldMinutes=
    matchLength * 6;

  const reservedGKMinutes=
    fixedGKMode
    ? matchLength
    : 0;

  const distributableMinutes=
    totalOutfieldMinutes -
    reservedGKMinutes;

  const exactTarget=
    distributableMinutes /
    rotatingPlayers.length;

  const desiredBlocks=
    Math.max(
      3,
      Math.round(matchLength/10)
    );

  const windows=[];

  let remaining=
    matchLength;

  for(let i=0;i<desiredBlocks;i++){

    const remainingBlocks=
      desiredBlocks-i;

    const block=
      Math.round(
        remaining /
        remainingBlocks
      );

    windows.push(block);

    remaining-=block;
  }

  const cumulative=[];

  let running=0;

  windows.forEach(w=>{
    running+=w;
    cumulative.push(running);
  });

  const floorTarget=
    Math.floor(exactTarget);

  const ceilTarget=
    Math.ceil(exactTarget);

  const extraPlayers=
    distributableMinutes -
    (
      floorTarget *
      rotatingPlayers.length
    );

  rotatingPlayers.forEach((p,index)=>{

    p.targetMinutes=
      index < extraPlayers
      ? ceilTarget
      : floorTarget;
  });

  function need(player){

    return (
      player.targetMinutes -
      player.outfieldMinutes
    );
  }

  function pick(role,used){

    let pool=
      rotatingPlayers.filter(p=>{

        if(used.has(p.name))
          return false;

        if(role==="any")
          return true;

        return p.positions[role];
      });

    pool=
      shuffle(pool)
      .sort((a,b)=>
        need(b)-need(a)
      );

    return pool[0];
  }

  let previousLineup=[];

  cumulative.forEach((time,index)=>{

    const blockMinutes=
      windows[index];

    const lineup=[];

    const used=
      new Set();

    const activeGK=
      time<=halfLength
      ? gk1Player
      : gk2Player;

    const offGoalGK=
      time<=halfLength
      ? gk2Player
      : gk1Player;

    lineup.push(activeGK);

    used.add(activeGK.name);

    if(fixedGKMode){

      lineup.push(offGoalGK);

      used.add(offGoalGK.name);
    }

    const rolePlan=[
      "midc",
      "def",
      "def",
      "midw",
      "att",
      "any"
    ];

    const outfieldNeeded=
      fixedGKMode
      ? 5
      : 6;

    for(let i=0;i<outfieldNeeded;i++){

      const picked=
        pick(
          rolePlan[i],
          used
        );

      if(!picked){

        showError(
          "Could not satisfy positions"
        );

        return;
      }

      lineup.push(picked);

      used.add(picked.name);
    }

    if(index>0){

      const overlap=
        lineup.filter(
          p=>previousLineup.includes(p)
        ).length;

      if(overlap>=6){

        const alternatives=
          rotatingPlayers
          .filter(
            p=>!lineup.includes(p)
          )
          .sort((a,b)=>
            need(b)-need(a)
          );

        if(alternatives.length){

          lineup[lineup.length-1]=
            alternatives[0];
        }
      }
    }

    lineup.forEach(player=>{

      player.totalMinutes+=
        blockMinutes;

      if(player!==activeGK){

        player.outfieldMinutes+=
          blockMinutes;
      }
    });

    blocks.push({
      time,
      lineup
    });

    previousLineup=[...lineup];
  });

  while(blocks.length>1){

    const last=
      blocks[blocks.length-1];

    const prev=
      blocks[blocks.length-2];

    const changes=
      last.lineup.filter(
        p=>!prev.lineup.includes(p)
      ).length;

    if(changes===0){

      blocks.pop();

    }else{
      break;
    }
  }

  buildPlan();
  buildMinutes();

  if(blocks.length){

    drawPitch(
      blocks[0].lineup
    );
  }

  currentIndex=0;

  updateNextSub();
}

function buildPlan(){

  let html="";

  if(blocks.length){

    html+=`
    <div class="planBlock">

      <strong>0m — Kickoff</strong><br>

      ${blocks[0].lineup
        .map(p=>p.name)
        .join(", ")}

    </div>
    `;
  }

  for(let i=1;i<blocks.length;i++){

    const block=blocks[i];

    const previous=
      blocks[i-1];

    const off=
      previous.lineup.filter(
        p=>!block.lineup.includes(p)
      );

    const on=
      block.lineup.filter(
        p=>!previous.lineup.includes(p)
      );

    html+=`
    <div class="planBlock">

      <strong>${block.time}m</strong><br>

      ${block.lineup
        .map(p=>p.name)
        .join(", ")}

      <div class="small">

      OFF:
      ${off.length
        ? off.map(p=>p.name).join(", ")
        : "None"}

      <br>

      ON:
      ${on.length
        ? on.map(p=>p.name).join(", ")
        : "None"}

      </div>

    </div>
    `;
  }

  planTable.innerHTML=html;
}

function buildMinutes(){

  let html="";

  playersData
    .sort((a,b)=>
      b.outfieldMinutes-a.outfieldMinutes
    )
    .forEach(player=>{

      html+=`
      <div>

        <strong>${player.name}</strong><br>

        Outfield:
        ${player.outfieldMinutes} mins

        <br>

        Total:
        ${player.totalMinutes} mins

      </div>

      <hr>
      `;
    });

  minutesTable.innerHTML=html;
}

function drawPitch(lineup){

  pitch.innerHTML="";

  const coords=[
    [50,92],
    [50,74],
    [22,60],
    [78,60],
    [50,45],
    [22,25],
    [78,25]
  ];

  lineup.forEach((player,index)=>{

    const el=
      document.createElement("div");

    el.className="token";

    el.innerText=player.name;

    el.style.left=
      coords[index][0]+"%";

    el.style.top=
      coords[index][1]+"%";

    pitch.appendChild(el);
  });
}

function updateNextSub(){

  if(!blocks[currentIndex+1]){

    nextSub.innerHTML=
      "Upcoming subs: none";

    return;
  }

  const current=
    blocks[currentIndex];

  const next=
    blocks[currentIndex+1];

  const off=
    current.lineup.filter(
      p=>!next.lineup.includes(p)
    );

  const on=
    next.lineup.filter(
      p=>!current.lineup.includes(p)
    );

  nextSub.innerHTML=
  `
  OFF:
  ${off.length
    ? off.map(p=>p.name).join(", ")
    : "None"}

  <br>

  ON:
  ${on.length
    ? on.map(p=>p.name).join(", ")
    : "None"}
  `;
}

function startMatch(){

  if(timer) return;

  timer=setInterval(()=>{

    seconds++;

    const mins=
      Math.floor(seconds/60)
      .toString()
      .padStart(2,"0");

    const secs=
      (seconds%60)
      .toString()
      .padStart(2,"0");

    clock.innerText=
      `${mins}:${secs}`;

    const next=
      blocks.find(
        b=>b.time>seconds/60
      );

    if(next){

      nextChange.innerText=
        `Next change: ${next.time} mins`;
    }

  },1000);
}

function pauseMatch(){

  clearInterval(timer);

  timer=null;
}

function resetMatch(){

  pauseMatch();

  seconds=0;

  clock.innerText="00:00";
}

function nextBlock(){

  currentIndex++;

  if(currentIndex>=blocks.length){

    currentIndex=
      blocks.length-1;

    updateNextSub();

    return;
  }

  drawPitch(
    blocks[currentIndex].lineup
  );

  updateNextSub();
}

renderPlayers();

</script>

</body>
</html>
