<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Coach Pro Elite</title>

<style>
body { font-family:-apple-system; margin:0; background:#f5f5f5; }
header { background:#111; color:#fff; padding:12px; text-align:center; }

.screen { display:none; padding:10px 10px 70px; }
.active { display:block; }

.tabbar {
  position:fixed; bottom:0; width:100%;
  display:flex; background:#fff; border-top:1px solid #ccc;
}
.tabbar button { flex:1; padding:10px; }

.card { background:#fff; padding:10px; margin-bottom:10px; border-radius:8px; }

.player { border-bottom:1px solid #eee; padding:6px 0; }

.pitch {
  position:relative;
  height:320px;
  background:linear-gradient(#4CAF50,#388E3C);
  border-radius:8px;
}

.token {
  position:absolute;
  background:#fff;
  padding:4px;
  border-radius:4px;
  font-size:11px;
  transform:translate(-50%,-50%);
}

.highlight { background:#ffeeba; padding:10px; text-align:center; }
</style>
</head>

<body>

<header>⚽ Coach Pro Elite</header>

<!-- SETUP -->
<div id="setup" class="screen active">
<div class="card">

<label>Match Length (mins)</label>
<input id="matchLength" value="40">

<label>Sub Window (mins, min 6)</label>
<input id="subWindow" value="6">

<label>Squad Size</label>
<input id="count" value="10" onchange="renderPlayers()">

<div id="players"></div>

<button onclick="saveSquad()">Save Squad</button>

<h4>Goalkeepers</h4>
<select id="gk1"></select>
<select id="gk2"></select>

<button onclick="generatePlan(); showTab('plan')">Generate Plan</button>

</div>
</div>

<!-- PLAN -->
<div id="plan" class="screen">
<div class="card">
<h3>Plan</h3>
<div id="planTable"></div>
</div>

<div class="card">
<h3>Pitch</h3>
<div id="pitch" class="pitch"></div>
</div>
</div>

<!-- MATCH -->
<div id="matchScreen" class="screen">
<div id="suggestion" class="highlight">Suggestion</div>
<button onclick="nextBlock()">Next Block</button>
</div>

<div class="tabbar">
<button onclick="showTab('setup')">Setup</button>
<button onclick="showTab('plan')">Plan</button>
<button onclick="showTab('matchScreen')">Match</button>
</div>

<script>

let players=[], blocks=[], currentIndex=0;

/* NAV */
function showTab(id){
  document.querySelectorAll(".screen").forEach(s=>s.classList.remove("active"));
  document.getElementById(id).classList.add("active");
}

/* RENDER PLAYERS */
function renderPlayers(){
  let saved = JSON.parse(localStorage.getItem("squad") || "[]");
  let n = parseInt(document.getElementById("count").value);
  let html = "";

  for(let i=0;i<n;i++){
    let p = saved[i] || {};

    html += `
    <div class="player">
      <input id="p${i}" value="${p.name||""}" placeholder="Player" oninput="updateGK()"><br>
      <label><input type="checkbox" id="def${i}" ${p.def?"checked":""}>DEF</label>
      <label><input type="checkbox" id="midc${i}" ${p.midc?"checked":""}>MID-C</label>
      <label><input type="checkbox" id="midw${i}" ${p.midw?"checked":""}>MID-W</label>
      <label><input type="checkbox" id="att${i}" ${p.att?"checked":""}>ATT</label>
    </div>`;
  }

  document.getElementById("players").innerHTML = html;
  updateGK();
}

/* SAVE */
function saveSquad(){
  let arr=[];
  let n=parseInt(document.getElementById("count").value);

  for(let i=0;i<n;i++){
    arr.push({
      name:getVal("p"+i),
      def:getCheck("def"+i),
      midc:getCheck("midc"+i),
      midw:getCheck("midw"+i),
      att:getCheck("att"+i)
    });
  }

  localStorage.setItem("squad", JSON.stringify(arr));
}

/* HELPERS */
function getVal(id){ return document.getElementById(id)?.value || ""; }
function getCheck(id){ return document.getElementById(id)?.checked || false; }

/* GK */
function updateGK(){
  let n=parseInt(document.getElementById("count").value);
  let html="";

  for(let i=0;i<n;i++){
    let name=getVal("p"+i)||"P"+(i+1);
    html += `<option value="${i}">${name}</option>`;
  }

  document.getElementById("gk1").innerHTML = html;
  document.getElementById("gk2").innerHTML = html;
}

/* GENERATE PLAN */
function generatePlan(){

  players=[];
  let n=parseInt(document.getElementById("count").value);

  for(let i=0;i<n;i++){
    players.push({
      name:getVal("p"+i)||"P"+(i+1),
      minutes:0
    });
  }

  let matchLen=parseFloat(document.getElementById("matchLength").value);
  let subWin=parseFloat(document.getElementById("subWindow").value);
  let block = (!subWin || subWin < 6) ? 6 : subWin;

  let totalBlocks=Math.floor(matchLen/block);
  let half=Math.floor(totalBlocks/2);

  let gk1p = players[document.getElementById("gk1").value];
  let gk2p = players[document.getElementById("gk2").value];

  blocks=[];

  for(let i=0;i<totalBlocks;i++){

    let gk = i<half ? gk1p : gk2p;

    let lineup=[gk];

    let pool=players.filter(p=>p!==gk);

    pool.sort((a,b)=>a.minutes-b.minutes);

    while(lineup.length<7 && pool.length>0){
      lineup.push(pool.shift());
    }

    lineup.forEach(p=>p.minutes+=block);

    blocks.push({time:i*block,lineup});
  }

  buildPlan();
  drawPitch(blocks[0].lineup);

  currentIndex=0;
}

/* PLAN */
function buildPlan(){
  let html="";
  blocks.forEach(b=>{
    html+=`<div><b>${b.time}m</b>: ${b.lineup.map(p=>p.name).join(", ")}</div>`;
  });
  document.getElementById("planTable").innerHTML = html;
}

/* PITCH */
function drawPitch(lineup){

  let pitch=document.getElementById("pitch");
  pitch.innerHTML="";

  let layout=[1,2,3,1];
  let y=[10,35,60,85];

  let i=0;

  for(let r=0;r<layout.length;r++){
    for(let j=0;j<layout[r];j++){

      if(!lineup[i]) continue;

      let x=(j+1)/(layout[r]+1)*100;

      let el=document.createElement("div");
      el.className="token";
      el.innerText=lineup[i].name;

      el.style.left=x+"%";
      el.style.top=y[r]+"%";

      pitch.appendChild(el);

      i++;
    }
  }
}

/* MATCH */
function nextBlock(){

  currentIndex++;

  if(currentIndex>=blocks.length) return;

  let current=blocks[currentIndex].lineup;
  drawPitch(current);

  let off=[...current].sort((a,b)=>b.minutes-a.minutes)[0];
  let bench=players.filter(p=>!current.includes(p));
  let on=[...bench].sort((a,b)=>a.minutes-b.minutes)[0];

  document.getElementById("suggestion").innerText =
    `Suggested: OFF ${off.name} / ON ${on.name}`;
}

/* INIT */
renderPlayers();

</script>

</body>
</html>
