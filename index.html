<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Coach Pro Elite</title>

<style>
body { font-family:-apple-system; margin:0; background:#f5f5f5; }
header { background:#111; color:#fff; padding:12px; text-align:center; }

.screen { display:none; padding:10px 10px 80px; }
.active { display:block; }

.tabbar { position:fixed; bottom:0; width:100%; display:flex; background:#fff; border-top:1px solid #ccc; }
.tabbar button { flex:1; padding:10px; }

.card { background:#fff; padding:10px; margin-bottom:10px; border-radius:8px; }
.player { border-bottom:1px solid #eee; padding:6px 0; }

.pitch { position:relative; height:320px; background:linear-gradient(#4CAF50,#388E3C); border-radius:8px; }
.token { position:absolute; background:#fff; padding:4px; border-radius:4px; font-size:11px; transform:translate(-50%,-50%); }

.highlight { background:#ffeeba; padding:10px; text-align:center; }
.timer { font-size:28px; text-align:center; margin:10px 0; }
</style>
</head>

<body>

<header>⚽ Coach Pro Elite</header>

<div id="setup" class="screen active">
<div class="card">

<label>Match Length</label>
<input id="matchLength" value="40">

<label>Sub Window</label>
<input id="subWindow" value="6">

<label>Squad Size</label>
<input id="count" value="11" onchange="renderPlayers()">

<label><input type="checkbox" id="gkMode" checked> GK full match mode</label>

<div id="playersContainer"></div>

<button onclick="saveSquad()">Save Squad</button>

<h4>Goalkeepers</h4>
<select id="gk1"></select>
<select id="gk2"></select>

<button onclick="generatePlan(); showTab('plan')">Generate Plan</button>

</div>
</div>

<div id="plan" class="screen">
<div class="card"><h3>Plan</h3><div id="planTable"></div></div>
<div class="card"><h3>Minutes</h3><div id="minutesTable"></div></div>
<div class="card"><div id="pitch" class="pitch"></div></div>
</div>

<div id="matchScreen" class="screen">
<div class="timer" id="clock">00:00</div>
<div id="nextChange" class="highlight"></div>
<div id="nextSub" class="highlight"></div>

<button onclick="startMatch()">Start</button>
<button onclick="pauseMatch()">Pause</button>
<button onclick="resetMatch()">Reset</button>
<button onclick="nextBlock()">Next Block</button>
</div>

<div class="tabbar">
<button onclick="showTab('setup')">Setup</button>
<button onclick="showTab('plan')">Plan</button>
<button onclick="showTab('matchScreen')">Match</button>
</div>

<script>

let playersData=[], blocks=[], currentIndex=0;
let timer=null, seconds=0;

/* HELPERS */
const val=id=>document.getElementById(id)?.value||"";
const chk=id=>document.getElementById(id)?.checked||false;

/* NAV */
function showTab(id){
  document.querySelectorAll(".screen").forEach(s=>s.classList.remove("active"));
  document.getElementById(id).classList.add("active");
}

/* SHUFFLE */
function shuffle(arr){
  return [...arr].sort(()=>Math.random()-0.5);
}

/* RENDER */
function renderPlayers(){
  const saved=JSON.parse(localStorage.getItem("squad")||"[]");
  const n=+val("count");
  let html="";

  for(let i=0;i<n;i++){
    let p=saved[i]||{};
    html+=`
    <div class="player">
      <input id="p${i}" value="${p.name||""}" oninput="updateGK()">
      <label><input type="checkbox" id="avail${i}" ${p.avail!==false?"checked":""}>Avail</label><br>
      <label><input type="checkbox" id="def${i}" ${p.def?"checked":""}>DEF</label>
      <label><input type="checkbox" id="midc${i}" ${p.midc?"checked":""}>MID-C</label>
      <label><input type="checkbox" id="midw${i}" ${p.midw?"checked":""}>MID-W</label>
      <label><input type="checkbox" id="att${i}" ${p.att?"checked":""}>ATT</label>
    </div>`;
  }

  document.getElementById("playersContainer").innerHTML=html;
  updateGK();
}

/* SAVE */
function saveSquad(){
  let arr=[];
  for(let i=0;i<count.value;i++){
    arr.push({
      name:val("p"+i),
      avail:chk("avail"+i),
      def:chk("def"+i),
      midc:chk("midc"+i),
      midw:chk("midw"+i),
      att:chk("att"+i)
    });
  }
  localStorage.setItem("squad", JSON.stringify(arr));
}

/* GK */
function updateGK(){
  let html="";
  for(let i=0;i<count.value;i++){
    if(!chk("avail"+i)) continue;
    html+=`<option>${val("p"+i)||"P"+(i+1)}</option>`;
  }
  gk1.innerHTML=html;
  gk2.innerHTML=html;
}

/* GENERATE */
function generatePlan(){

  playersData=[];

  for(let i=0;i<count.value;i++){
    if(!chk("avail"+i)) continue;

    playersData.push({
      name:val("p"+i)||"P"+(i+1),
      minutes:0,
      pos:{
        def:chk("def"+i),
        midc:chk("midc"+i),
        midw:chk("midw"+i),
        att:chk("att"+i)
      }
    });
  }

  let block=Math.max(6,+val("subWindow"));
  let totalBlocks=Math.floor(+val("matchLength")/block);
  let half=Math.floor(totalBlocks/2);

  let gk1p=playersData.find(p=>p.name===gk1.value);
  let gk2p=playersData.find(p=>p.name===gk2.value);

  const template=["gk","def","def","midc","midc","midw","att"];

  blocks=[];

  for(let i=0;i<totalBlocks;i++){

    let gk=i<half?gk1p:gk2p;

    let lineup=[];
    let pool=[...playersData];

    function pick(role){

      let candidates=pool.filter(p=>{
        if(p===gk) return false;

        // GK full match logic
        if(chk("gkMode")){
          if(i<half && p===gk2p) return false;
          if(i>=half && p===gk1p) return false;
        }

        if(role==="def") return p.pos.def;
        if(role==="midc") return p.pos.midc;
        if(role==="midw") return p.pos.midw;
        if(role==="att") return p.pos.att;

        return true;
      });

      if(candidates.length===0){
        candidates=pool.filter(p=>p!==gk);
      }

      candidates=shuffle(candidates);
      candidates.sort((a,b)=>a.minutes-b.minutes);

      let chosen=candidates[0];
      pool=pool.filter(p=>p!==chosen);

      return chosen;
    }

    template.forEach(role=>{
      if(role==="gk"){
        lineup.push(gk);
      } else {
        lineup.push(pick(role));
      }
    });

    lineup.forEach(p=>p.minutes+=block);

    blocks.push({time:i*block,lineup});
  }

  buildPlan();
  buildMinutes();
  drawPitch(blocks[0].lineup);

  currentIndex=0;
  updateNextSub();
}

/* PLAN */
function buildPlan(){
  planTable.innerHTML=blocks.map(b=>`<div><b>${b.time}m</b>: ${b.lineup.map(p=>p.name).join(", ")}</div>`).join("");
}

/* MINUTES */
function buildMinutes(){
  minutesTable.innerHTML=playersData.map(p=>`${p.name}: ${p.minutes} mins`).join("<br>");
}

/* PITCH */
function drawPitch(lineup){
  let pitch=document.getElementById("pitch");
  pitch.innerHTML="";
  let layout=[1,2,3,1], y=[10,35,60,85], i=0;

  layout.forEach((c,r)=>{
    for(let j=0;j<c;j++){
      let p=lineup[i++];
      if(!p) continue;

      let el=document.createElement("div");
      el.className="token";
      el.innerText=p.name;

      el.style.left=((j+1)/(c+1)*100)+"%";
      el.style.top=y[r]+"%";

      pitch.appendChild(el);
    }
  });
}

/* MATCH */
function updateNextSub(){
  if(!blocks[currentIndex+1]) return;

  let current=blocks[currentIndex].lineup;
  let next=blocks[currentIndex+1].lineup;

  let off=current.filter(p=>!next.includes(p));
  let on=next.filter(p=>!current.includes(p));

  nextSub.innerText=`Next: OFF ${off.map(p=>p.name).join(", ")} | ON ${on.map(p=>p.name).join(", ")}`;
}

/* TIMER */
function startMatch(){
  if(timer) return;

  timer=setInterval(()=>{
    seconds++;
    let m=Math.floor(seconds/60).toString().padStart(2,'0');
    let s=(seconds%60).toString().padStart(2,'0');
    clock.innerText=`${m}:${s}`;

    let block=+val("subWindow");
    let next=Math.ceil(seconds/60/block)*block;
    nextChange.innerText=`Next change at ${next} min`;

  },1000);
}

function pauseMatch(){clearInterval(timer);timer=null;}
function resetMatch(){pauseMatch();seconds=0;clock.innerText="00:00";}

function nextBlock(){
  currentIndex++;
  if(currentIndex>=blocks.length) return;
  drawPitch(blocks[currentIndex].lineup);
  updateNextSub();
}

/* INIT */
renderPlayers();

</script>

</body>
</html>
